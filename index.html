<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给最爱的老婆</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(255,80,80,0.24) 0%, rgba(140,0,0,0.18) 22%, rgba(50,0,0,0.92) 62%, #140000 100%),
        linear-gradient(180deg, #3a0000 0%, #1a0000 45%, #0b0000 100%);
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .blessing {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
      max-width: min(82vw, 980px);
      padding: 14px 28px;
      color: rgba(255, 238, 242, 0.72);
      font-size: clamp(22px, 2.45vw, 36px);
      font-weight: 600;
      letter-spacing: 0.16em;
      text-align: center;
      line-height: 1.45;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.008));
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 40px rgba(255,255,255,0.02), 0 10px 40px rgba(0,0,0,0.16);
      text-shadow: 0 0 10px rgba(255, 142, 164, 0.22), 0 0 24px rgba(255, 86, 116, 0.12);
      opacity: 0.9;
      mix-blend-mode: screen;
    }

    .blessing::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: radial-gradient(circle at 50% 50%, rgba(255,150,170,0.11), rgba(255,150,170,0.02) 54%, rgba(255,150,170,0) 78%);
      filter: blur(12px);
      z-index: -1;
    }

    @media (max-width: 640px) {
      .blessing {
        top: 16px;
        max-width: calc(100vw - 24px);
        padding: 12px 16px;
        font-size: clamp(18px, 4.8vw, 26px);
        letter-spacing: 0.08em;
        white-space: normal;
      }
    }

    .music-btn {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 20;
      width: 56px;
      height: 56px;
      border: 1px solid rgba(255, 220, 228, 0.22);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.22), rgba(255,120,150,0.18) 32%, rgba(80,0,18,0.72) 100%);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.28),
        inset 0 0 20px rgba(255,255,255,0.08),
        0 0 24px rgba(255, 96, 132, 0.14);
      backdrop-filter: blur(8px);
      color: rgba(255, 244, 246, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .music-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 14px 32px rgba(0,0,0,0.30),
        inset 0 0 24px rgba(255,255,255,0.10),
        0 0 30px rgba(255, 96, 132, 0.18);
    }

    .music-btn:active {
      transform: scale(0.97);
    }

    .music-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      opacity: 0.95;
      pointer-events: none;
    }

    .music-btn.playing::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(255, 150, 176, 0.16);
      box-shadow: 0 0 18px rgba(255, 110, 150, 0.14);
      animation: musicPulse 2.1s ease-out infinite;
    }

    @keyframes musicPulse {
      0% { transform: scale(0.92); opacity: 0.55; }
      70% { transform: scale(1.16); opacity: 0.06; }
      100% { transform: scale(1.22); opacity: 0; }
    }

    @media (max-width: 640px) {
      .music-btn {
        right: 16px;
        bottom: 16px;
        width: 52px;
        height: 52px;
      }
    }

  </style>
</head>
<body>
  <div class="blessing">愿与你朝朝暮暮，欢喜与共，余生皆是心动</div>
  <canvas id="c"></canvas>
  <input id="photoInput" type="file" accept="image/*" style="display:none;" />
  <button id="musicBtn" class="music-btn" type="button" aria-label="播放音乐">
    <svg id="musicIcon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M8 6.82v10.36c0 .79.87 1.27 1.54.84l8.07-5.18a1 1 0 0 0 0-1.68L9.54 5.98A1 1 0 0 0 8 6.82Z"></path>
    </svg>
  </button>


  <script>
    const PHOTO_SRC = './she.jpg'; // 替换成你的照片链接
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let w = 0;
    let h = 0;
    let cx = 0;
    let cy = 0;
    let unit = 1;
    let time = 0;
    let beatPhase = 0;
    let titleReveal = 0;
    let titleTarget = 0;
    let photoReveal = 0;
    let photoReady = false;
    let mobilePinnedReveal = false;
    const photoInput = document.getElementById('photoInput');
    const revealPhoto = new Image();
    const PHOTO_STORAGE_KEY = 'love-heart-photo-data-url';
    revealPhoto.crossOrigin = 'anonymous';
    revealPhoto.onload = () => { photoReady = true; };

    function loadDefaultPhoto() {
      if (PHOTO_SRC) {
        revealPhoto.src = PHOTO_SRC;
      }
    }

    function restoreSavedPhoto() {
      try {
        const saved = localStorage.getItem(PHOTO_STORAGE_KEY);
        if (saved) {
          revealPhoto.src = saved;
          return true;
        }
      } catch (err) {
        console.warn('读取本地保存的照片失败。', err);
      }
      return false;
    }

    if (!restoreSavedPhoto()) {
      loadDefaultPhoto();
    }

    photoInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        try {
          localStorage.setItem(PHOTO_STORAGE_KEY, dataUrl);
        } catch (err) {
          console.warn('保存照片到本地失败，可能是图片太大或浏览器限制。', err);
        }
        revealPhoto.src = dataUrl;
      };
      reader.readAsDataURL(file);
      photoInput.value = '';
    });

    window.addEventListener('keydown', (e) => {
      if ((e.key === 'p' || e.key === 'P') && !e.repeat) {
        e.preventDefault();
        photoInput.click();
      }
    });

    // 你要加自己的歌曲时，只需要把下面这行改成你的文件名，例如 './love.mp3'
    const bgm = new Audio('./your-song.mp3');
    bgm.loop = true;
    bgm.volume = 0.72;

    const musicBtn = document.getElementById('musicBtn');
    const musicIcon = document.getElementById('musicIcon');

    function setMusicBtnState(isPlaying) {
      musicBtn.classList.toggle('playing', isPlaying);
      musicBtn.setAttribute('aria-label', isPlaying ? '暂停音乐' : '播放音乐');
      musicIcon.innerHTML = isPlaying
        ? '<path d="M7 5.5h3.2v13H7zm6.8 0H17v13h-3.2z"></path>'
        : '<path d="M8 6.82v10.36c0 .79.87 1.27 1.54.84l8.07-5.18a1 1 0 0 0 0-1.68L9.54 5.98A1 1 0 0 0 8 6.82Z"></path>';
    }

    async function toggleMusic() {
      try {
        if (bgm.paused) {
          await bgm.play();
          setMusicBtnState(true);
        } else {
          bgm.pause();
          setMusicBtnState(false);
        }
      } catch (err) {
        console.warn('音乐播放失败，请确认歌曲文件路径是否正确。', err);
        setMusicBtnState(false);
      }
    }

    musicBtn.addEventListener('click', toggleMusic);
    bgm.addEventListener('play', () => setMusicBtnState(true));
    bgm.addEventListener('pause', () => setMusicBtnState(false));
    bgm.addEventListener('ended', () => setMusicBtnState(false));

    const pointer = {
      x: -9999,
      y: -9999,
      radius: 180
    };

    const shards = [];
    const glows = [];
    const floaters = [];
    const streamers = [];
    const ambientBits = [];
    const petals = [];
    const SHARD_COUNT = 940;
    const GLOW_COUNT = 90;
    const FLOATER_COUNT = 42;
    const STREAMER_COUNT = 48;
    const AMBIENT_COUNT = 34;
    const PETAL_COUNT = 22;
    const MESH_LINK_SPAN = 10;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = w / 2;
      cy = h / 2;
      unit = Math.min(w, h) * 0.30;
      buildScene();
    }

    function heartPoint(t, s = 1) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      return { x: x * s, y: y * s };
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function buildScene() {
      shards.length = 0;
      glows.length = 0;
      floaters.length = 0;
      streamers.length = 0;
      ambientBits.length = 0;
      petals.length = 0;

      for (let i = 0; i < SHARD_COUNT; i++) {
        const t = Math.random() * Math.PI * 2;
        const edge = heartPoint(t, 1);

        // 轮廓依然清晰，但把中层和内层补厚，避免内部太空
        const roll = Math.random();
        let radial;
        if (roll < 0.40) {
          radial = rand(0.76, 0.98);
        } else if (roll < 0.78) {
          radial = rand(0.42, 0.78);
        } else {
          radial = rand(0.16, 0.58);
        }

        // 收紧左右，强化顶部双瓣和底部尖角，让心形更明显
        const sideFactor = Math.abs(edge.x) / 16;
        const topFactor = Math.max(0, (-edge.y - 2) / 16);
        const bottomFactor = Math.max(0, (edge.y + 6) / 12);
        radial -= sideFactor * rand(0.03, 0.08);
        radial += topFactor * rand(0.01, 0.05);
        radial -= bottomFactor * rand(0.01, 0.05);

        // 小幅表面起伏，避免破坏轮廓
        if (radial > 0.80 && Math.random() < 0.18) {
          radial += rand(0.01, 0.05);
        }
        radial = Math.max(0.22, Math.min(1.02, radial));

        const isOuterShell = radial > 0.74;
        const isMidBand = radial > 0.36 && radial <= 0.74;
        const isInnerLayer = radial <= 0.36;

        if (radial < 0.12 && Math.random() < 0.04) continue;

        const isBigShard = Math.random() < (isOuterShell ? 0.11 : (isMidBand ? 0.08 : 0.03));
        const isTinyShard = !isBigShard && Math.random() < (isInnerLayer ? 0.24 : 0.12);

        const jitterRange = isOuterShell ? 0.55 : (isMidBand ? 0.95 : 1.05);
        const px = edge.x * radial + rand(-jitterRange, jitterRange);
        const py = edge.y * radial + rand(-jitterRange, jitterRange);

        shards.push({
          seed: Math.random() * 1000,
          angle: t,
          baseX: px,
          baseY: py,
          depth: radial,
          rot: rand(0, Math.PI * 2),
          spin: rand(-0.012, 0.012),
          size: isBigShard
            ? (isOuterShell ? rand(7, 14) : rand(5.5, 10))
            : (isTinyShard ? rand(1.3, 3.6) : (isOuterShell ? rand(3.2, 7.8) : (isMidBand ? rand(3.1, 6.9) : rand(2.6, 5.8)))),
          stretch: isBigShard ? rand(0.95, 2.0) : rand(0.78, 1.55),
          brightness: isOuterShell ? rand(0.86, 1.18) : (isMidBand ? rand(0.60, 1.00) : rand(0.40, 0.86)),
          alpha: isOuterShell ? rand(0.38, 0.84) : (isMidBand ? rand(0.30, 0.60) : rand(0.20, 0.40)),
          drift: rand(0.35, 1.1),
          fragility: isOuterShell ? rand(0.45, 0.85) : rand(0.8, 1.6),
          layerLift: isOuterShell ? rand(0.45, 1.0) : rand(0.2, 0.8),
          isBigShard,
          isTinyShard,
          isInnerLayer,
          x: cx,
          y: cy,
          vx: 0,
          vy: 0,
          flicker: rand(0.2, 1.2)
        });
      }

      shards.sort((a, b) => a.angle - b.angle);

      for (let i = 0; i < GLOW_COUNT; i++) {
        const t = Math.random() * Math.PI * 2;
        const edge = heartPoint(t, rand(1.02, 1.14));
        glows.push({
          seed: Math.random() * 1000,
          baseX: edge.x,
          baseY: edge.y,
          size: rand(10, 34),
          alpha: rand(0.04, 0.18),
          drift: rand(0.3, 1.0)
        });
      }

      for (let i = 0; i < FLOATER_COUNT; i++) {
        const t = Math.random() * Math.PI * 2;
        const edge = heartPoint(t, rand(1.05, 1.18));
        const orbit = rand(1.02, 1.18);
        floaters.push({
          seed: Math.random() * 1000,
          baseX: edge.x * orbit,
          baseY: edge.y * orbit,
          rot: rand(0, Math.PI * 2),
          spin: rand(-0.01, 0.01),
          size: rand(1.2, 4.8),
          stretch: rand(0.8, 1.7),
          alpha: rand(0.08, 0.22),
          brightness: rand(0.65, 1.05),
          drift: rand(0.5, 1.3),
          x: cx,
          y: cy,
          vx: 0,
          vy: 0
        });
      }

      for (let i = 0; i < STREAMER_COUNT; i++) {
        streamers.push({
          seed: Math.random() * 1000,
          lane: rand(-0.30, 0.26),
          offset: Math.random(),
          speed: rand(0.050, 0.11),
          size: rand(1.2, 4.2),
          stretch: rand(1.0, 2.1),
          alpha: rand(0.10, 0.28),
          brightness: rand(0.72, 1.12),
          wobble: rand(0.6, 1.4),
          x: 0,
          y: 0,
          rot: rand(-0.18, 0.18)
        });
      }

      for (let i = 0; i < AMBIENT_COUNT; i++) {
        ambientBits.push({
          seed: Math.random() * 1000,
          x: Math.random() * w,
          y: Math.random() * h,
          size: rand(10, 28),
          alpha: rand(0.03, 0.10),
          drift: rand(0.12, 0.45),
          stretch: rand(0.8, 1.8),
          rot: rand(0, Math.PI * 2)
        });
      }

      for (let i = 0; i < PETAL_COUNT; i++) {
        petals.push({
          seed: Math.random() * 1000,
          x: Math.random() * w,
          y: Math.random() * h,
          size: rand(7, 16),
          alpha: rand(0.04, 0.10),
          driftX: rand(0.10, 0.32),
          driftY: rand(0.28, 0.62),
          rot: rand(0, Math.PI * 2),
          spin: rand(-0.01, 0.01),
          petal: Math.random() < 0.55
        });
      }
    }

    function colorForShard(b, a, depth = 0.5, angle = 0, isInnerLayer = false) {
      const hot = Math.min(1, Math.max(0, b));
      const angleMix = (Math.sin(angle) + 1) * 0.5;
      const depthMix = Math.min(1, Math.max(0, depth));

      // 渐变逻辑：外壳更亮偏鲜红，中层偏玫红酒红，内层更暗更透
      const r = Math.floor(120 + 70 * hot + 42 * depthMix + 16 * angleMix);
      const g = Math.floor(8 + 20 * hot + 6 * angleMix);
      const blue = Math.floor(14 + 16 * (1 - depthMix) + 18 * angleMix);

      const innerFade = isInnerLayer ? a * 0.88 : a;
      return `rgba(${r}, ${g}, ${blue}, ${innerFade})`;
    }

    function updateShard(s, pulse, dt) {
      const breathing = 1 + 0.06 * pulse;
      const wave = 1 + Math.sin(time * (0.9 + s.drift) + s.seed) * 0.028 * s.fragility;

      const depthCenter = s.isInnerLayer ? -10 : (s.depth > 0.72 ? 8 : 1.5);
      const tx = cx + s.baseX * unit * 0.06 * breathing * wave;
      const ty = cy + s.baseY * unit * 0.06 * breathing * wave - depthCenter * 0.18;

      const dxp = tx - pointer.x;
      const dyp = ty - pointer.y;
      const dist = Math.hypot(dxp, dyp);
      let repelX = 0;
      let repelY = 0;
      if (dist < pointer.radius) {
        const p = (1 - dist / pointer.radius);
        const ang = Math.atan2(dyp, dxp);
        repelX = Math.cos(ang) * p * 26;
        repelY = Math.sin(ang) * p * 26;
      }

      const innerNoiseX = Math.sin(time * (1.2 + s.drift) + s.seed * 0.7) * 1.6 * s.fragility;
      const innerNoiseY = Math.cos(time * (1.1 + s.drift) + s.seed * 1.1) * 1.6 * s.fragility;

      s.vx += ((tx + repelX + innerNoiseX) - s.x) * 0.055 * dt;
      s.vy += ((ty + repelY + innerNoiseY) - s.y) * 0.055 * dt;
      s.vx *= 0.88;
      s.vy *= 0.88;
      s.x += s.vx;
      s.y += s.vy;
      s.rot += s.spin * dt + Math.sin(time + s.seed) * 0.002;
    }

    function updateFloater(f, pulse, dt) {
      const tx = cx + f.baseX * unit * 0.06 + Math.sin(time * (0.8 + f.drift) + f.seed) * 8;
      const ty = cy + f.baseY * unit * 0.06 + Math.cos(time * (1.0 + f.drift) + f.seed) * 8;
      f.vx += (tx - f.x) * 0.035 * dt;
      f.vy += (ty - f.y) * 0.035 * dt;
      f.vx *= 0.92;
      f.vy *= 0.92;
      f.x += f.vx;
      f.y += f.vy;
      f.rot += f.spin * dt;
    }

    function updateStreamer(s) {
      const probe = ((time * s.speed) + s.offset) % 1;
      const probeX = cx + (-1.12 + probe * 2.24) * unit * 0.92;
      const probeY = cy + (s.lane + Math.sin(time * (1.5 + s.wobble) + s.seed) * 0.055) * unit * 0.72;
      const nearHeart = Math.max(0, 1 - Math.hypot((probeX - cx) / (unit * 0.70), (probeY - (cy + unit * 0.02)) / (unit * 0.52)));
      const speedBoost = 1 + nearHeart * 0.42;
      const progress = ((time * s.speed * speedBoost) + s.offset) % 1;
      const xNorm = -1.12 + progress * 2.24;
      const yWave = s.lane + Math.sin(time * (1.5 + s.wobble) + s.seed) * 0.055;
      s.x = cx + xNorm * unit * 0.92;
      s.y = cy + yWave * unit * 0.72;
      s.rot = 0.10 + Math.sin(time * 1.8 + s.seed) * 0.08;
      s.progress = progress;
      s.nearHeart = nearHeart;
    }

    function drawBackground(pulse) {
      ctx.clearRect(0, 0, w, h);

      const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.72);
      bg.addColorStop(0, `rgba(255,70,70,${0.14 + pulse * 0.05})`);
      bg.addColorStop(0.24, 'rgba(255,0,70,0.12)');
      bg.addColorStop(0.58, 'rgba(120,0,30,0.10)');
      bg.addColorStop(1, 'rgba(10,0,0,0.44)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < 14; i++) {
        const x = (Math.sin(time * 0.17 + i * 12.7) * 0.5 + 0.5) * w;
        const y = (Math.cos(time * 0.12 + i * 9.4) * 0.5 + 0.5) * h;
        const r = 60 + (i % 4) * 22;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, 'rgba(255,34,48,0.06)');
        g.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawHUD(pulse) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      for (let y = 0; y < h; y += 7) {
        const a = 0.010 + 0.006 * Math.sin(time * 1.4 + y * 0.025);
        ctx.strokeStyle = `rgba(255, 70, 82, ${a})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(w, y + 0.5);
        ctx.stroke();
      }

      for (let x = 0; x < w; x += 120) {
        ctx.strokeStyle = 'rgba(255, 60, 76, 0.03)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, h);
        ctx.stroke();
      }

      const m = 28;
      const len = 26;
      ctx.strokeStyle = `rgba(255, 92, 104, ${0.12 + pulse * 0.03})`;
      ctx.lineWidth = 1;
      const corners = [
        [m, m, 1, 1],
        [w - m, m, -1, 1],
        [m, h - m, 1, -1],
        [w - m, h - m, -1, -1]
      ];
      for (const [x, y, sx, sy] of corners) {
        ctx.beginPath();
        ctx.moveTo(x, y + len * sy);
        ctx.lineTo(x, y);
        ctx.lineTo(x + len * sx, y);
        ctx.stroke();
      }

      const scanY = (time * 70) % (h + 80) - 40;
      const scanGrad = ctx.createLinearGradient(0, scanY - 12, 0, scanY + 12);
      scanGrad.addColorStop(0, 'rgba(255,0,0,0)');
      scanGrad.addColorStop(0.5, 'rgba(255,90,100,0.05)');
      scanGrad.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = scanGrad;
      ctx.fillRect(0, scanY - 12, w, 24);

      ctx.restore();
    }

    function drawGlowShell(pulse) {
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      for (const g of glows) {
        const gx = cx + g.baseX * unit * 0.06 * (1 + pulse * 0.04) + Math.sin(time * (0.7 + g.drift) + g.seed) * 4;
        const gy = cy + g.baseY * unit * 0.06 * (1 + pulse * 0.04) + Math.cos(time * (0.9 + g.drift) + g.seed) * 4;
        const radius = g.size * (1 + Math.sin(time * 1.6 + g.seed) * 0.12);
        const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, radius);
        grad.addColorStop(0, 'rgba(190,48,58,0.18)');
        grad.addColorStop(0.22, 'rgba(132,20,34,0.12)');
        grad.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(gx, gy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawMesh(pulse) {
      const maxLink = 24 + pulse * 3;
      for (let i = 0; i < shards.length; i += 1) {
        const a = shards[i];
        let linked = 0;
        for (let step = 1; step <= MESH_LINK_SPAN && linked < 2; step++) {
          const b = shards[(i + step) % shards.length];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.hypot(dx, dy);
          const depthClose = 1 - Math.min(1, Math.abs(a.depth - b.depth) * 2.2);
          if (dist < maxLink && depthClose > 0.3) {
            const alpha = (1 - dist / maxLink) * 0.18 * depthClose;
            ctx.strokeStyle = `rgba(${178 + Math.floor((a.depth + b.depth) * 16)}, ${18 + Math.floor((a.depth + b.depth) * 6)}, ${28 + Math.floor((1 - (a.depth + b.depth) * 0.5) * 10)}, ${alpha})`;
            ctx.lineWidth = 0.45 + ((a.depth + b.depth) * 0.22);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
            linked++;
          }
        }
      }
    }

    function drawInnerNetwork(pulse) {
      const inner = shards.filter(s => s.isInnerLayer || (s.depth > 0.30 && s.depth < 0.68));
      const maxLink = 34 + pulse * 5;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      for (let i = 0; i < inner.length; i += 3) {
        const a = inner[i];
        let linked = 0;
        for (let j = i + 1; j < Math.min(inner.length, i + 12) && linked < 3; j++) {
          const b = inner[j];
          const ay = a.y + (1 - a.depth) * 8;
          const by = b.y + (1 - b.depth) * 8;
          const dx = a.x - b.x;
          const dy = ay - by;
          const dist = Math.hypot(dx, dy);
          if (dist < maxLink) {
            const baseAlpha = (1 - dist / maxLink) * 0.15;
            const ctrlX = (a.x + b.x) * 0.5 + Math.sin(time * 1.1 + a.seed + b.seed) * 5;
            const ctrlY = (ay + by) * 0.5 - 4;
            const lane = ((Math.floor((a.seed + b.seed) * 10) % 6) + 6) % 6;
            const wave = (Math.sin(time * 3.6 - lane * 0.9) + 1) * 0.5;
            const beatBoost = Math.pow(Math.max(0, Math.sin(beatPhase * Math.PI)), 1.5);
            const energy = Math.min(1, 0.3 + wave * 0.8 + beatBoost * 0.7);
            const alpha = baseAlpha * energy;

            ctx.strokeStyle = `rgba(255, ${70 + Math.floor(((a.depth + b.depth) * 0.5) * 20)}, ${76 + Math.floor((1 - (a.depth + b.depth) * 0.5) * 12)}, ${alpha})`;
            ctx.lineWidth = 0.45 + energy * 0.55;
            ctx.beginPath();
            ctx.moveTo(a.x, ay);
            ctx.quadraticCurveTo(ctrlX, ctrlY, b.x, by);
            ctx.stroke();

            const t = (time * 0.8 + lane * 0.17) % 1;
            const omt = 1 - t;
            const px = omt * omt * a.x + 2 * omt * t * ctrlX + t * t * b.x;
            const py = omt * omt * ay + 2 * omt * t * ctrlY + t * t * by;
            ctx.fillStyle = `rgba(255, 225, 225, ${alpha * 0.9})`;
            ctx.beginPath();
            ctx.arc(px, py, 1.1 + energy * 0.9, 0, Math.PI * 2);
            ctx.fill();
            linked++;
          }
        }
      }

      ctx.restore();
    }

    function drawTriangle(x, y, size, angle, stretch, fillStyle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.scale(stretch, 1);
      ctx.fillStyle = fillStyle;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.88, size * 0.72);
      ctx.lineTo(-size * 0.88, size * 0.72);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawGlassHighlight(x, y, size, angle, stretch, alpha, isBigShard = false) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.scale(stretch, 1);

      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.88, size * 0.72);
      ctx.lineTo(-size * 0.88, size * 0.72);
      ctx.closePath();
      ctx.clip();

      const shine = ctx.createLinearGradient(-size * 0.9, -size * 0.8, size * 0.7, size * 0.9);
      shine.addColorStop(0, `rgba(255, 250, 250, ${alpha * (isBigShard ? 0.24 : 0.16)})`);
      shine.addColorStop(0.24, `rgba(255, 185, 195, ${alpha * 0.12})`);
      shine.addColorStop(0.48, `rgba(255, 110, 130, 0)`);
      shine.addColorStop(0.72, `rgba(255, 150, 170, ${alpha * 0.05})`);
      shine.addColorStop(1, `rgba(255, 255, 255, ${alpha * (isBigShard ? 0.12 : 0.07)})`);
      ctx.fillStyle = shine;
      ctx.fillRect(-size * 1.2, -size * 1.2, size * 2.4, size * 2.4);

      const edgeGlow = ctx.createLinearGradient(-size * 0.5, -size, size * 0.5, size * 0.7);
      edgeGlow.addColorStop(0, `rgba(255,255,255,${alpha * 0.16})`);
      edgeGlow.addColorStop(0.35, `rgba(255,205,215,${alpha * 0.08})`);
      edgeGlow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = edgeGlow;
      ctx.lineWidth = isBigShard ? 1.1 : 0.6;
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.96);
      ctx.lineTo(size * 0.82, size * 0.66);
      ctx.lineTo(-size * 0.82, size * 0.66);
      ctx.closePath();
      ctx.stroke();

      if (isBigShard) {
        ctx.strokeStyle = `rgba(255,245,248,${alpha * 0.16})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(-size * 0.12, -size * 0.48);
        ctx.lineTo(size * 0.26, -size * 0.02);
        ctx.lineTo(size * 0.08, size * 0.32);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawFloaters(pulse) {
      ctx.save();
      for (const f of floaters) {
        const alpha = f.alpha * (0.8 + 0.2 * Math.sin(time * 1.8 + f.seed));
        const size = f.size * (0.9 + 0.18 * Math.sin(time * (1.1 + f.drift) + f.seed));

        const glow = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, size * 2.2);
        glow.addColorStop(0, colorForShard(f.brightness + 0.08, alpha * 0.14, 0.95, Math.atan2(f.y - cy, f.x - cx), false));
        glow.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(f.x, f.y, size * 2.2, 0, Math.PI * 2);
        ctx.fill();
        drawTriangle(f.x, f.y, size, f.rot, f.stretch, colorForShard(f.brightness, alpha, 0.95, Math.atan2(f.y - cy, f.x - cx), false));
      }
      ctx.restore();
    }

    function drawStreamers() {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const s of streamers) {
        const nearHeart = s.nearHeart || 0;
        const fade = Math.sin(Math.PI * s.progress);
        const alpha = s.alpha * (0.45 + fade * 0.95) * (1 + nearHeart * 0.55);
        const size = s.size * (0.92 + fade * 0.5 + nearHeart * 0.22);

        const trail = ctx.createLinearGradient(s.x - size * 7.2, s.y, s.x + size * 2.6, s.y);
        trail.addColorStop(0, `rgba(255, 236, 240, ${alpha * 0.02})`);
        trail.addColorStop(0.18, `rgba(255, 176, 188, ${alpha * 0.10})`);
        trail.addColorStop(0.52, `rgba(255, 82, 108, ${alpha * 0.18})`);
        trail.addColorStop(1, `rgba(255, 214, 222, ${alpha * 0.03})`);
        ctx.strokeStyle = trail;
        ctx.lineWidth = 0.8 + nearHeart * 0.45;
        ctx.beginPath();
        ctx.moveTo(s.x - size * 6.6, s.y);
        ctx.lineTo(s.x + size * 2.2, s.y);
        ctx.stroke();

        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, size * 3.1);
        glow.addColorStop(0, colorForShard(s.brightness + 0.16 + nearHeart * 0.12, alpha * 0.24, 0.9, 0.18, false));
        glow.addColorStop(0.45, `rgba(255, 90, 116, ${alpha * 0.13})`);
        glow.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(s.x, s.y, size * 3.1, 0, Math.PI * 2);
        ctx.fill();

        const shardGrad = ctx.createLinearGradient(s.x - size * 1.1, s.y - size, s.x + size * 1.1, s.y + size);
        shardGrad.addColorStop(0, `rgba(255, 248, 250, ${alpha * 0.70})`);
        shardGrad.addColorStop(0.28, `rgba(255, 198, 210, ${alpha * 0.86})`);
        shardGrad.addColorStop(0.68, `rgba(255, 90, 120, ${alpha * 0.95})`);
        shardGrad.addColorStop(1, `rgba(188, 26, 44, ${alpha * 0.82})`);
        drawTriangle(s.x, s.y, size, s.rot, s.stretch, shardGrad);
      }
      ctx.restore();
    }

    function drawAmbientBits() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (const a of ambientBits) {
        const x = (a.x + Math.sin(time * a.drift + a.seed) * 16 + w) % w;
        const y = (a.y + Math.cos(time * (a.drift * 0.8) + a.seed) * 10 + h) % h;
        const glow = ctx.createRadialGradient(x, y, 0, x, y, a.size);
        glow.addColorStop(0, `rgba(255, 110, 126, ${a.alpha})`);
        glow.addColorStop(0.5, `rgba(255, 58, 82, ${a.alpha * 0.35})`);
        glow.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(x, y, a.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(a.rot + Math.sin(time * 0.4 + a.seed) * 0.12);
        ctx.scale(a.stretch, 1);
        ctx.strokeStyle = `rgba(255, 212, 220, ${a.alpha * 0.28})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(-a.size * 0.18, 0);
        ctx.lineTo(a.size * 0.18, 0);
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawPetals() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (const p of petals) {
        p.y = (p.y + p.driftY) % (h + 40);
        p.x = (p.x + Math.sin(time * 0.8 + p.seed) * p.driftX + w) % (w + 20);
        p.rot += p.spin;

        ctx.save();
        ctx.translate(p.x, p.y - 20);
        ctx.rotate(p.rot + Math.sin(time * 0.7 + p.seed) * 0.2);
        ctx.globalAlpha = p.alpha;

        if (p.petal) {
          const grad = ctx.createLinearGradient(-p.size * 0.6, -p.size, p.size * 0.6, p.size);
          grad.addColorStop(0, 'rgba(255, 246, 248, 0.9)');
          grad.addColorStop(0.45, 'rgba(255, 198, 212, 0.7)');
          grad.addColorStop(1, 'rgba(255, 126, 150, 0.0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(0, -p.size * 0.9);
          ctx.bezierCurveTo(p.size * 0.8, -p.size * 0.4, p.size * 0.7, p.size * 0.7, 0, p.size);
          ctx.bezierCurveTo(-p.size * 0.7, p.size * 0.7, -p.size * 0.8, -p.size * 0.4, 0, -p.size * 0.9);
          ctx.fill();
        } else {
          const grad = ctx.createLinearGradient(-p.size, -p.size, p.size, p.size);
          grad.addColorStop(0, 'rgba(255,255,255,0.65)');
          grad.addColorStop(0.4, 'rgba(255,180,196,0.28)');
          grad.addColorStop(1, 'rgba(255,0,0,0)');
          ctx.strokeStyle = grad;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(-p.size * 0.65, 0);
          ctx.lineTo(0, -p.size * 0.65);
          ctx.lineTo(p.size * 0.65, 0);
          ctx.lineTo(0, p.size * 0.65);
          ctx.closePath();
          ctx.stroke();
        }
        ctx.restore();
      }
      ctx.restore();
    }

    function drawDecorFrame() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const m = 22;
      const len = 70;
      const s = 16;
      const corners = [
        [m, m, 1, 1],
        [w - m, m, -1, 1],
        [m, h - m, 1, -1],
        [w - m, h - m, -1, -1]
      ];

      for (const [x, y, sx, sy] of corners) {
        const grad = ctx.createLinearGradient(x, y, x + len * sx, y + len * sy);
        grad.addColorStop(0, 'rgba(255, 236, 220, 0.14)');
        grad.addColorStop(0.5, 'rgba(255, 170, 178, 0.10)');
        grad.addColorStop(1, 'rgba(255, 90, 112, 0.02)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1;

        ctx.beginPath();
        ctx.moveTo(x, y + len * sy);
        ctx.lineTo(x, y);
        ctx.lineTo(x + len * sx, y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x + s * sx, y + 3 * sy);
        ctx.lineTo(x + (s + 10) * sx, y + 3 * sy);
        ctx.moveTo(x + 3 * sx, y + s * sy);
        ctx.lineTo(x + 3 * sx, y + (s + 10) * sy);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawCenterTitle() {
      const dx = pointer.x - cx;
      const dy = pointer.y - cy;
      const inside = Math.pow(dx / (unit * 0.26), 2) + Math.pow((dy + unit * 0.02) / (unit * 0.20), 2) < 1;
      const revealActive = inside || mobilePinnedReveal;
      titleTarget = revealActive ? 1 : 0;
      const easing = revealActive ? 0.075 : 0.045;
      titleReveal += (titleTarget - titleReveal) * easing;
      photoReveal += ((revealActive ? 1 : 0) - photoReveal) * 0.055;
      if (titleReveal < 0.012 && photoReveal < 0.012) return;

      const reveal = titleReveal * titleReveal * (3 - 2 * titleReveal);
      const breathe = Math.sin(time * 1.6) * unit * 0.010 * Math.max(reveal, photoReveal);
      const textY = cy + unit * 0.03 + breathe;

      if (photoReveal > 0.02) {
        drawHeartPhoto(photoReveal);
        if (photoReady) {
          drawCenterPhoto(photoReveal, textY);
        }
      }

      if (reveal < 0.012) return;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      const coreGlow = ctx.createRadialGradient(cx, textY, 0, cx, textY, unit * (0.08 + reveal * 0.16));
      coreGlow.addColorStop(0, `rgba(255, 244, 232, ${0.12 + reveal * 0.18})`);
      coreGlow.addColorStop(0.24, `rgba(255, 196, 160, ${0.09 + reveal * 0.16})`);
      coreGlow.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = coreGlow;
      ctx.beginPath();
      ctx.arc(cx, textY, unit * (0.08 + reveal * 0.16), 0, Math.PI * 2);
      ctx.fill();

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${Math.max(26, Math.floor(unit * 0.18))}px "STKaiti", "KaiTi", "DFKai-SB", cursive`;
      ctx.shadowColor = `rgba(255, 156, 120, ${0.34 * reveal})`;
      ctx.shadowBlur = 20;
      const grad = ctx.createLinearGradient(cx - unit * 0.22, textY - unit * 0.06, cx + unit * 0.22, textY + unit * 0.06);
      grad.addColorStop(0, `rgba(255, 248, 238, ${0.98 * reveal})`);
      grad.addColorStop(0.24, `rgba(255, 228, 200, ${0.99 * reveal})`);
      grad.addColorStop(0.56, `rgba(255, 198, 154, ${0.99 * reveal})`);
      grad.addColorStop(0.82, `rgba(244, 150, 112, ${0.98 * reveal})`);
      grad.addColorStop(1, `rgba(255, 230, 214, ${0.96 * reveal})`);
      ctx.fillStyle = grad;
      ctx.fillText('爱晓玲', cx, textY);

      ctx.lineWidth = 0.9;
      ctx.strokeStyle = `rgba(255, 252, 246, ${0.16 * reveal})`;
      ctx.strokeText('爱晓玲', cx, textY);
      ctx.restore();
    }


    function drawButterflyGlow(x, y, scale, angle, alpha) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.globalCompositeOperation = 'lighter';

      const wingGradL = ctx.createRadialGradient(-scale * 0.52, -scale * 0.10, 0, -scale * 0.52, -scale * 0.10, scale * 0.95);
      wingGradL.addColorStop(0, `rgba(255,250,252,${alpha * 0.95})`);
      wingGradL.addColorStop(0.42, `rgba(255,182,214,${alpha * 0.85})`);
      wingGradL.addColorStop(1, 'rgba(255,120,180,0)');
      ctx.fillStyle = wingGradL;
      ctx.beginPath();
      ctx.ellipse(-scale * 0.48, -scale * 0.08, scale * 0.42, scale * 0.66, -0.55, 0, Math.PI * 2);
      ctx.fill();

      const wingGradR = ctx.createRadialGradient(scale * 0.52, -scale * 0.10, 0, scale * 0.52, -scale * 0.10, scale * 0.95);
      wingGradR.addColorStop(0, `rgba(255,250,252,${alpha * 0.95})`);
      wingGradR.addColorStop(0.42, `rgba(255,182,214,${alpha * 0.85})`);
      wingGradR.addColorStop(1, 'rgba(255,120,180,0)');
      ctx.fillStyle = wingGradR;
      ctx.beginPath();
      ctx.ellipse(scale * 0.48, -scale * 0.08, scale * 0.42, scale * 0.66, 0.55, 0, Math.PI * 2);
      ctx.fill();

      const wingGradLB = ctx.createRadialGradient(-scale * 0.30, scale * 0.42, 0, -scale * 0.30, scale * 0.42, scale * 0.70);
      wingGradLB.addColorStop(0, `rgba(255,232,242,${alpha * 0.72})`);
      wingGradLB.addColorStop(0.5, `rgba(255,152,198,${alpha * 0.56})`);
      wingGradLB.addColorStop(1, 'rgba(255,120,180,0)');
      ctx.fillStyle = wingGradLB;
      ctx.beginPath();
      ctx.ellipse(-scale * 0.28, scale * 0.42, scale * 0.28, scale * 0.42, -0.42, 0, Math.PI * 2);
      ctx.fill();

      const wingGradRB = ctx.createRadialGradient(scale * 0.30, scale * 0.42, 0, scale * 0.30, scale * 0.42, scale * 0.70);
      wingGradRB.addColorStop(0, `rgba(255,232,242,${alpha * 0.72})`);
      wingGradRB.addColorStop(0.5, `rgba(255,152,198,${alpha * 0.56})`);
      wingGradRB.addColorStop(1, 'rgba(255,120,180,0)');
      ctx.fillStyle = wingGradRB;
      ctx.beginPath();
      ctx.ellipse(scale * 0.28, scale * 0.42, scale * 0.28, scale * 0.42, 0.42, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = `rgba(255,245,248,${alpha * 0.72})`;
      ctx.lineWidth = Math.max(1, scale * 0.10);
      ctx.beginPath();
      ctx.moveTo(0, -scale * 0.55);
      ctx.lineTo(0, scale * 0.62);
      ctx.stroke();

      ctx.lineWidth = Math.max(0.8, scale * 0.06);
      ctx.beginPath();
      ctx.moveTo(0, -scale * 0.48);
      ctx.quadraticCurveTo(-scale * 0.18, -scale * 0.86, -scale * 0.30, -scale * 0.98);
      ctx.moveTo(0, -scale * 0.48);
      ctx.quadraticCurveTo(scale * 0.18, -scale * 0.86, scale * 0.30, -scale * 0.98);
      ctx.stroke();

      ctx.restore();
    }

    function drawHeartPhoto(reveal) {
      const ease = reveal * reveal * (3 - 2 * reveal);
      const heartScale = unit * 0.0735;
      const boundsW = unit * 1.18;
      const boundsH = unit * 1.14;

      ctx.save();
      ctx.translate(cx, cy + unit * 0.015);

      // 只裁剪爱心范围，用来承载“非照片区域”的变化
      ctx.beginPath();
      for (let i = 0; i <= 220; i++) {
        const t = (i / 220) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        const x = hp.x * heartScale;
        const y = hp.y * heartScale;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.clip();

      // 爱心剩余区域的底色、柔雾和微光
      const haze = ctx.createRadialGradient(0, 0, unit * 0.03, 0, 0, unit * 0.56);
      haze.addColorStop(0, `rgba(255,255,255,${0.02 + ease * 0.02})`);
      haze.addColorStop(0.34, `rgba(255,175,202,${0.05 + ease * 0.05})`);
      haze.addColorStop(0.70, `rgba(156,18,64,${0.12 + ease * 0.07})`);
      haze.addColorStop(1, `rgba(32,0,10,${0.18 + ease * 0.03})`);
      ctx.fillStyle = haze;
      ctx.fillRect(-boundsW * 1.4, -boundsH * 1.4, boundsW * 2.8, boundsH * 2.8);

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 14; i++) {
        const angle = -Math.PI / 2 + (i / 14) * Math.PI * 2 + time * 0.07;
        const radiusX = unit * (0.14 + (i % 4) * 0.020);
        const radiusY = unit * (0.12 + (i % 3) * 0.018);
        const px = Math.cos(angle) * radiusX;
        const py = Math.sin(angle) * radiusY;
        const petal = ctx.createRadialGradient(px, py, 0, px, py, unit * 0.095);
        petal.addColorStop(0, `rgba(255,245,250,${0.06 + ease * 0.05})`);
        petal.addColorStop(0.44, `rgba(255,170,206,${0.10 + ease * 0.08})`);
        petal.addColorStop(1, 'rgba(255,120,176,0)');
        ctx.fillStyle = petal;
        ctx.beginPath();
        ctx.ellipse(px, py, unit * 0.024, unit * 0.070, angle * 0.72, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      ctx.save();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + time * (0.10 + i * 0.004);
        const rx = unit * (0.17 + (i % 3) * 0.028);
        const ry = unit * (0.13 + (i % 2) * 0.026);
        const bx = Math.cos(a) * rx;
        const by = Math.sin(a) * ry;
        const scale = unit * (0.020 + (i % 3) * 0.004);
        const flap = Math.sin(time * 3.1 + i) * 0.18;
        drawButterflyGlow(bx, by, scale, a * 0.45 + flap, 0.28 + ease * 0.34);
      }
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (let i = 0; i < 28; i++) {
        const angle = (i / 28) * Math.PI * 2 + time * 0.16;
        const radius = unit * (0.12 + (i % 7) * 0.016);
        const sx = Math.cos(angle) * radius;
        const sy = Math.sin(angle) * radius;
        const size = unit * (0.004 + (i % 3) * 0.002);
        ctx.fillStyle = `rgba(255, ${230 + (i % 3) * 8}, ${238 + (i % 4) * 4}, ${0.12 + ease * 0.14})`;
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
        if (i % 4 === 0) {
          ctx.strokeStyle = `rgba(255,245,248,${0.12 + ease * 0.14})`;
          ctx.lineWidth = Math.max(0.8, unit * 0.0025);
          ctx.beginPath();
          ctx.moveTo(sx - size * 2.8, sy);
          ctx.lineTo(sx + size * 2.8, sy);
          ctx.moveTo(sx, sy - size * 2.8);
          ctx.lineTo(sx, sy + size * 2.8);
          ctx.stroke();
        }
      }
      ctx.restore();

      // 中间留出位置给“弹出的照片”
      ctx.globalCompositeOperation = 'destination-out';
      const hollow = ctx.createRadialGradient(0, 0, 0, 0, 0, unit * 0.26);
      hollow.addColorStop(0, 'rgba(255,255,255,1)');
      hollow.addColorStop(0.64, 'rgba(255,255,255,0.86)');
      hollow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hollow;
      ctx.beginPath();
      ctx.ellipse(0, 0, unit * 0.19, unit * 0.155, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = 'source-over';
      const veil = ctx.createRadialGradient(0, 0, 0, 0, 0, unit * 0.48);
      veil.addColorStop(0, 'rgba(255,255,255,0)');
      veil.addColorStop(0.54, `rgba(118,18,34,${0.02 + ease * 0.018})`);
      veil.addColorStop(0.86, `rgba(54,4,18,${0.05 + ease * 0.02})`);
      veil.addColorStop(1, `rgba(20,0,0,${0.06 - ease * 0.015})`);
      ctx.fillStyle = veil;
      ctx.fillRect(-boundsW * 1.35, -boundsH * 1.35, boundsW * 2.7, boundsH * 2.7);
      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy + unit * 0.015);
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = `rgba(255, 238, 242, ${ease * 0.15})`;
      ctx.lineWidth = 1.05;
      ctx.beginPath();
      for (let i = 0; i <= 220; i++) {
        const t = (i / 220) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        const x = hp.x * heartScale;
        const y = hp.y * heartScale;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function drawCenterPhoto(reveal, centerY) {
      const ease = reveal * reveal * (3 - 2 * reveal);
      const px = cx;
      const py = centerY - unit * 0.002;
      const scale = 1.06 - ease * 0.03;
      const alpha = 0.22 + ease * 0.68;
      const hoverTiltX = ((pointer.x - cx) / (unit * 0.5)) * 2.6;
      const hoverTiltY = ((pointer.y - cy) / (unit * 0.5)) * 1.8;

      // 让中间照片本身就是明显的大心形
      const popupHeartScale = unit * 0.064;
      const areaW = unit * 1.32;
      const areaH = unit * 1.12;

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate((hoverTiltX * 0.007) * Math.PI / 180);
      ctx.scale(scale, scale);

      ctx.beginPath();
      for (let i = 0; i <= 260; i++) {
        const t = (i / 260) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        const x = hp.x * popupHeartScale;
        const y = hp.y * popupHeartScale;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.clip();

      ctx.globalAlpha = alpha;
      const imgRatio = revealPhoto.width / revealPhoto.height;
      let drawW = areaW;
      let drawH = areaH;
      if (imgRatio > drawW / drawH) {
        drawH = areaH;
        drawW = drawH * imgRatio;
      } else {
        drawW = areaW;
        drawH = drawW / imgRatio;
      }

      const coverScale = 1.34;
      drawW *= coverScale;
      drawH *= coverScale;

      ctx.drawImage(
        revealPhoto,
        -drawW / 2 - hoverTiltX * 0.08,
        -drawH / 2 - hoverTiltY * 0.08,
        drawW,
        drawH
      );

      // 强化心形内部高光
      const shine = ctx.createRadialGradient(0, -unit * 0.12, 0, 0, 0, unit * 0.70);
      shine.addColorStop(0, `rgba(255,255,255,${0.08 + ease * 0.10})`);
      shine.addColorStop(0.38, `rgba(255,236,242,${0.05 + ease * 0.08})`);
      shine.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = shine;
      ctx.fillRect(-areaW * 1.4, -areaH * 1.4, areaW * 2.8, areaH * 2.8);

      // 边缘压暗，让心形边界更清楚
      const vignette = ctx.createRadialGradient(0, 0, 0, 0, 0, unit * 0.80);
      vignette.addColorStop(0, 'rgba(255,255,255,0)');
      vignette.addColorStop(0.60, 'rgba(110,18,28,0.03)');
      vignette.addColorStop(1, 'rgba(20,0,0,0.18)');
      ctx.fillStyle = vignette;
      ctx.fillRect(-areaW * 1.4, -areaH * 1.4, areaW * 2.8, areaH * 2.8);

      ctx.restore();

      // 用心形描边和心形外发光，而不是圆形光晕
      ctx.save();
      ctx.translate(px, py);
      ctx.globalCompositeOperation = 'lighter';

      ctx.strokeStyle = `rgba(255, 238, 242, ${ease * 0.30})`;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      for (let i = 0; i <= 260; i++) {
        const t = (i / 260) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        const x = hp.x * popupHeartScale;
        const y = hp.y * popupHeartScale;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();

      ctx.strokeStyle = `rgba(255, 150, 176, ${ease * 0.16})`;
      ctx.lineWidth = unit * 0.012;
      ctx.beginPath();
      for (let i = 0; i <= 260; i++) {
        const t = (i / 260) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        const x = hp.x * popupHeartScale * 1.02;
        const y = hp.y * popupHeartScale * 1.02;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();

      const heartGlow = ctx.createRadialGradient(0, 0, unit * 0.12, 0, 0, unit * 0.86);
      heartGlow.addColorStop(0, 'rgba(255,160,180,0)');
      heartGlow.addColorStop(0.46, `rgba(255,118,154,${ease * 0.06})`);
      heartGlow.addColorStop(0.78, `rgba(255,98,140,${ease * 0.10})`);
      heartGlow.addColorStop(1, 'rgba(255,98,140,0)');
      ctx.fillStyle = heartGlow;
      ctx.beginPath();
      for (let i = 0; i <= 260; i++) {
        const t = (i / 260) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        const x = hp.x * popupHeartScale * 1.20;
        const y = hp.y * popupHeartScale * 1.20;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawShards(pulse) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      const ordered = shards;

      for (const s of ordered) {
        const flicker = 0.78 + 0.26 * Math.sin(time * (1.7 + s.flicker) + s.seed);
        const alpha = s.alpha * flicker;
        const perspective = s.isInnerLayer ? (0.92 + s.depth * 0.24) : (0.7 + s.depth * 0.58);
        const size = s.size * perspective * (0.95 + 0.12 * Math.sin(time * 1.5 + s.seed));
        const innerSink = s.isInnerLayer ? 0.6 + (0.36 - s.depth) * 6 : 0;
        const liftY = (1 - s.depth) * 12 - s.layerLift * 5 + innerSink;
        const px = s.x;
        const py = s.y + liftY;

        if (alpha > 0.09) {
          const glowScale = s.isBigShard ? 4.0 : (s.isTinyShard ? 1.9 : 3.0);
          const glow = ctx.createRadialGradient(px, py, 0, px, py, size * glowScale);
          glow.addColorStop(0, colorForShard(s.brightness + 0.18, alpha * (s.isInnerLayer ? 0.12 : 0.16), s.depth, s.angle, s.isInnerLayer));
          glow.addColorStop(1, 'rgba(60,0,10,0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(px, py, size * glowScale, 0, Math.PI * 2);
          ctx.fill();
        }

        const shardAlpha = s.isInnerLayer ? alpha * 0.92 : alpha;
        drawTriangle(
          px,
          py,
          size,
          s.rot + Math.sin(time * 0.9 + s.seed) * (s.isBigShard ? 0.08 : 0.14),
          s.stretch,
          colorForShard(s.brightness + pulse * 0.05 + s.depth * 0.04, shardAlpha, s.depth, s.angle, s.isInnerLayer)
        );
        drawGlassHighlight(
          px,
          py,
          size,
          s.rot + Math.sin(time * 0.9 + s.seed) * (s.isBigShard ? 0.08 : 0.14),
          s.stretch,
          shardAlpha,
          s.isBigShard
        );

        if (shardAlpha > 0.12) {
          ctx.save();
          ctx.translate(px, py);
          ctx.rotate(s.rot + Math.sin(time * 0.9 + s.seed) * (s.isBigShard ? 0.08 : 0.14));
          ctx.scale(s.stretch, 1);
          ctx.strokeStyle = colorForShard(1.05, shardAlpha * (s.isBigShard ? 0.34 : 0.18), Math.min(1, s.depth + 0.08), s.angle, false);
          ctx.lineWidth = s.isBigShard ? 0.95 : 0.45;
          ctx.beginPath();
          ctx.moveTo(0, -size);
          ctx.lineTo(size * 0.88, size * 0.72);
          ctx.lineTo(-size * 0.88, size * 0.72);
          ctx.closePath();
          ctx.stroke();

          if (s.isBigShard || (!s.isTinyShard && Math.sin(s.seed * 3.1) > -0.1)) {
            ctx.strokeStyle = colorForShard(1.15, shardAlpha * 0.18, Math.max(0.2, s.depth - 0.1), s.angle, true);
            ctx.lineWidth = 0.35;
            ctx.beginPath();
            ctx.moveTo(0, -size * 0.72);
            ctx.lineTo(size * 0.18, size * 0.08);
            ctx.lineTo(-size * 0.24, size * 0.52);
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      ctx.restore();
    }

    function drawCore(pulse) {
      const reveal = titleReveal * titleReveal * (3 - 2 * titleReveal);
      const r = 11 + pulse * 6;
      const grad = ctx.createRadialGradient(cx, cy + unit * 0.02, 0, cx, cy + unit * 0.02, r * (4.4 + reveal * 0.5));
      grad.addColorStop(0, `rgba(255,160,165,${0.36 + reveal * 0.12})`);
      grad.addColorStop(0.12, `rgba(255,86,96,${0.24 + reveal * 0.10})`);
      grad.addColorStop(0.28, `rgba(220,24,40,${0.12 + reveal * 0.08})`);
      grad.addColorStop(1, 'rgba(50,0,10,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy + unit * 0.02, r * (4.4 + reveal * 0.5), 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = `rgba(255, 110, 120, ${0.16 + pulse * 0.08 + reveal * 0.10})`;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.arc(cx, cy + unit * 0.02, r * 1.6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy + unit * 0.02, r * 2.45, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }


    function isPointInCenterRevealZone(x, y) {
      const dx = x - cx;
      const dy = y - cy;
      return Math.pow(dx / (unit * 0.26), 2) + Math.pow((dy + unit * 0.02) / (unit * 0.20), 2) < 1;
    }

    function syncPointerFromTouch(touch) {
      if (!touch) return;
      pointer.x = touch.clientX;
      pointer.y = touch.clientY;
    }

    function frame(now) {
      const dt = Math.min(1.8, (now - (frame.last || now)) / 16.6667);
      frame.last = now;
      time += dt * 0.016;
      const pulse = (Math.sin(time * 2.15) + 1) * 0.5;
      beatPhase = (time * 0.34) % 1;

      drawBackground(pulse);
      drawAmbientBits();
      drawPetals();
      drawDecorFrame();
      drawHUD(pulse);
      for (const s of shards) updateShard(s, pulse, dt);
      for (const f of floaters) updateFloater(f, pulse, dt);
      for (const s of streamers) updateStreamer(s);
      drawGlowShell(pulse);
      drawInnerNetwork(pulse);
      drawMesh(pulse);
      drawShards(pulse);
      drawFloaters(pulse);
      drawStreamers();
      drawCore(pulse);
      drawCenterTitle();
      requestAnimationFrame(frame);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
    });
    window.addEventListener('mouseleave', () => {
      pointer.x = -9999;
      pointer.y = -9999;
    });
    window.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      if (!t) return;
      syncPointerFromTouch(t);

      if (isPointInCenterRevealZone(t.clientX, t.clientY)) {
        mobilePinnedReveal = !mobilePinnedReveal;
      } else if (!mobilePinnedReveal) {
        pointer.x = -9999;
        pointer.y = -9999;
      }
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (!t) return;
      syncPointerFromTouch(t);
    }, { passive: true });

    window.addEventListener('touchend', () => {
      if (!mobilePinnedReveal) {
        pointer.x = -9999;
        pointer.y = -9999;
      }
    });

    window.addEventListener('touchcancel', () => {
      if (!mobilePinnedReveal) {
        pointer.x = -9999;
        pointer.y = -9999;
      }
    });

    resize();
    for (const s of shards) {
      s.x = cx + rand(-12, 12);
      s.y = cy + rand(-12, 12);
    }
    for (const f of floaters) {
      f.x = cx + rand(-30, 30);
      f.y = cy + rand(-30, 30);
    }
    for (const s of streamers) {
      updateStreamer(s);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
