<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给最爱的老婆</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(255,80,80,0.24) 0%, rgba(140,0,0,0.18) 22%, rgba(50,0,0,0.92) 62%, #140000 100%),
        linear-gradient(180deg, #3a0000 0%, #1a0000 45%, #0b0000 100%);
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .blessing {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
      max-width: min(82vw, 980px);
      padding: 14px 28px;
      color: rgba(255, 238, 242, 0.72);
      font-size: clamp(22px, 2.45vw, 36px);
      font-weight: 600;
      letter-spacing: 0.16em;
      text-align: center;
      line-height: 1.45;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.008));
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 40px rgba(255,255,255,0.02), 0 10px 40px rgba(0,0,0,0.16);
      text-shadow: 0 0 10px rgba(255, 142, 164, 0.22), 0 0 24px rgba(255, 86, 116, 0.12);
      opacity: 0.9;
      mix-blend-mode: screen;
    }

    .blessing::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: radial-gradient(circle at 50% 50%, rgba(255,150,170,0.11), rgba(255,150,170,0.02) 54%, rgba(255,150,170,0) 78%);
      filter: blur(12px);
      z-index: -1;
    }

    @media (max-width: 640px) {
      .blessing {
        top: 16px;
        max-width: calc(100vw - 24px);
        padding: 12px 16px;
        font-size: clamp(18px, 4.8vw, 26px);
        letter-spacing: 0.08em;
        white-space: normal;
      }
    }

    .music-btn {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 20;
      width: 56px;
      height: 56px;
      border: 1px solid rgba(255, 220, 228, 0.22);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.22), rgba(255,120,150,0.18) 32%, rgba(80,0,18,0.72) 100%);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.28),
        inset 0 0 20px rgba(255,255,255,0.08),
        0 0 24px rgba(255, 96, 132, 0.14);
      backdrop-filter: blur(8px);
      color: rgba(255, 244, 246, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .music-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 14px 32px rgba(0,0,0,0.30),
        inset 0 0 24px rgba(255,255,255,0.10),
        0 0 30px rgba(255, 96, 132, 0.18);
    }

    .music-btn:active {
      transform: scale(0.97);
    }

    .music-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      opacity: 0.95;
      pointer-events: none;
    }

    .music-btn.playing::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(255, 150, 176, 0.16);
      box-shadow: 0 0 18px rgba(255, 110, 150, 0.14);
      animation: musicPulse 2.1s ease-out infinite;
    }

    @keyframes musicPulse {
      0% { transform: scale(0.92); opacity: 0.55; }
      70% { transform: scale(1.16); opacity: 0.06; }
      100% { transform: scale(1.22); opacity: 0; }
    }

    @media (max-width: 640px) {
      .music-btn {
        right: 16px;
        bottom: 16px;
        width: 52px;
        height: 52px;
      }
    }



    .subtitle {
      position: fixed;
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
      color: rgba(255, 218, 224, 0.55);
      font-size: clamp(12px, 1.1vw, 16px);
      letter-spacing: 0.42em;
      text-indent: 0.42em;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255, 120, 148, 0.18);
      mix-blend-mode: screen;
    }

    .corner-poem {
      position: fixed;
      z-index: 12;
      color: rgba(255, 228, 232, 0.48);
      font-family: "STKaiti", "KaiTi", cursive;
      font-size: clamp(14px, 1.25vw, 20px);
      line-height: 1.9;
      letter-spacing: 0.16em;
      white-space: pre-line;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255, 100, 130, 0.10);
    }
    .corner-poem.left-bottom { left: 34px; bottom: 78px; text-align: left; }
    .corner-poem.right-bottom { right: 34px; bottom: 78px; text-align: right; }

    .side-verse {
      position: fixed;
      top: 50%;
      z-index: 11;
      transform: translateY(-50%);
      color: rgba(255, 216, 224, 0.30);
      font-family: "STKaiti", "KaiTi", cursive;
      font-size: clamp(16px, 1.35vw, 22px);
      letter-spacing: 0.32em;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255, 88, 120, 0.10);
    }
    .side-verse.left { left: 26px; }
    .side-verse.right { right: 26px; }

    .floating-heart {
      position: fixed;
      color: rgba(255, 196, 208, 0.16);
      font-size: clamp(10px, 1vw, 16px);
      pointer-events: none;
      user-select: none;
      animation: floatHeart var(--dur, 12s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      filter: drop-shadow(0 0 8px rgba(255, 90, 126, 0.16));
      mix-blend-mode: screen;
      will-change: transform, opacity;
    }

    @keyframes floatHeart {
      0% {
        transform: translate3d(0, -8px, 0) scale(0.86);
        opacity: 0.08;
      }
      22% {
        opacity: 0.22;
      }
      48% {
        transform: translate3d(calc(var(--tx, 12px) * 0.55), 18px, 0) scale(1.02);
        opacity: 0.34;
      }
      72% {
        transform: translate3d(var(--tx, 12px), 44px, 0) scale(1.10);
        opacity: 0.28;
      }
      100% {
        transform: translate3d(calc(var(--tx, 12px) * 1.35), 76px, 0) scale(0.92);
        opacity: 0.10;
      }
    }

    .signature {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 12;
      color: rgba(255, 220, 226, 0.28);
      font-size: clamp(11px, 1vw, 14px);
      letter-spacing: 0.28em;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255, 100, 136, 0.10);
    }

    @media (max-width: 640px) {
      .subtitle { top: 72px; font-size: 11px; letter-spacing: 0.24em; text-indent: 0.24em; }
      .corner-poem { font-size: 12px; line-height: 1.7; }
      .corner-poem.left-bottom { left: 14px; bottom: 90px; max-width: 32vw; }
      .corner-poem.right-bottom { right: 14px; bottom: 90px; max-width: 34vw; }
      .side-verse { font-size: 12px; opacity: 0.8; }
      .side-verse.left { left: 8px; }
      .side-verse.right { right: 8px; }
      .signature { bottom: 10px; font-size: 10px; letter-spacing: 0.16em; }
    }

  </style>
</head>
<body>
  <div class="blessing">愿与你朝朝暮暮，欢喜与共，余生皆是心动</div>
  <div class="subtitle">山河远阔，人间烟火，无一是你，无一不是你</div>
  <div class="side-verse left">所念皆星河　星河皆是你</div>
  <div class="side-verse right">乍见心欢　久处仍怦然</div>
  <div class="corner-poem left-bottom">《越人歌》
今夕何夕兮，搴舟中流。
今日何日兮，得与王子同舟。
蒙羞被好兮，不訾诟耻。
心几烦而不绝兮，得知王子。</div>
  <div class="corner-poem right-bottom">晓看天色暮看云
行也思君，坐也思君
见字如晤，目光所至
皆是你留下的温柔</div>
  <div class="floating-heart" style="left:8%;top:10%;--tx:12px;--dur:14s;--delay:-1s;">❤</div>
  <div class="floating-heart" style="left:13%;top:24%;--tx:16px;--dur:12.8s;--delay:-5s;">❤</div>
  <div class="floating-heart" style="left:18%;top:40%;--tx:10px;--dur:13.5s;--delay:-2.3s;">❤</div>
  <div class="floating-heart" style="left:10%;top:57%;--tx:14px;--dur:11.6s;--delay:-7s;">❤</div>
  <div class="floating-heart" style="left:16%;top:76%;--tx:18px;--dur:12.2s;--delay:-3.8s;">❤</div>
  <div class="floating-heart" style="left:24%;top:16%;--tx:9px;--dur:13.8s;--delay:-6.2s;">❤</div>
  <div class="floating-heart" style="left:26%;top:70%;--tx:11px;--dur:12.9s;--delay:-2.6s;">❤</div>
  <div class="floating-heart" style="left:34%;top:86%;--tx:7px;--dur:10.9s;--delay:-4.1s;">❤</div>
  <div class="floating-heart" style="left:66%;top:13%;--tx:-9px;--dur:13.1s;--delay:-5.5s;">❤</div>
  <div class="floating-heart" style="left:74%;top:26%;--tx:-14px;--dur:12.6s;--delay:-1.9s;">❤</div>
  <div class="floating-heart" style="left:82%;top:40%;--tx:-10px;--dur:14.2s;--delay:-6.8s;">❤</div>
  <div class="floating-heart" style="left:88%;top:58%;--tx:-16px;--dur:11.8s;--delay:-3.4s;">❤</div>
  <div class="floating-heart" style="left:80%;top:76%;--tx:-12px;--dur:12.4s;--delay:-7.2s;">❤</div>
  <div class="floating-heart" style="left:72%;top:68%;--tx:-8px;--dur:13.6s;--delay:-2.7s;">❤</div>
  <div class="floating-heart" style="left:58%;top:84%;--tx:-6px;--dur:10.8s;--delay:-4.8s;">❤</div>
  <div class="floating-heart" style="left:42%;top:8%;--tx:5px;--dur:15s;--delay:-8s;">❤</div>
  <div class="floating-heart" style="left:50%;top:88%;--tx:0px;--dur:11.2s;--delay:-1.4s;">❤</div>
  <div class="floating-heart" style="left:92%;top:18%;--tx:-13px;--dur:12.7s;--delay:-5.9s;">❤</div>
  <div class="signature">2026.03.19　予你一场不落幕的心动</div>

  <div id="dragHint" style="
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    color:rgba(255,200,220,0.45);font-size:13px;letter-spacing:0.12em;
    pointer-events:none;user-select:none;text-align:center;
    transition:opacity 1s ease;
  ">拖动立体旋转 · 点击中心探索内部世界 · 双击或按 R 归位</div>

  <button id="returnBtn" style="
    position:fixed;left:22px;bottom:22px;z-index:20;
    width:52px;height:52px;border-radius:50%;
    border:1px solid rgba(255,200,220,0.22);
    background:radial-gradient(circle at 35% 30%,rgba(255,255,255,0.18),rgba(255,100,140,0.16) 40%,rgba(80,0,20,0.70));
    color:rgba(255,240,245,0.92);font-size:22px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.28),inset 0 0 16px rgba(255,255,255,0.06);
    backdrop-filter:blur(8px);
    opacity:0;pointer-events:none;
    transition:opacity 0.4s ease,transform 0.2s ease;
    -webkit-tap-highlight-color:transparent;
  " title="归位 (R / 双击)">⟳</button>
  <canvas id="c"></canvas>
  <input id="innerPhotoInput" type="file" accept="image/*" style="display:none;" />
  <button id="musicBtn" class="music-btn" type="button" aria-label="播放音乐">
    <svg id="musicIcon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M8 6.82v10.36c0 .79.87 1.27 1.54.84l8.07-5.18a1 1 0 0 0 0-1.68L9.54 5.98A1 1 0 0 0 8 6.82Z"></path>
    </svg>
  </button>


  <script>
    const INNER_PHOTO_SRC = './she.jpg'; // ★ 内部世界照片 —— 改成你的图片路径即可
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let w = 0;
    let h = 0;
    let cx = 0;
    let cy = 0;
    let unit = 1;
    let time = 0;
    let beatPhase = 0;
    let titleReveal = 0;

    // ══ 3D 立体旋转状态 ══
    // 欧拉角（弧度）
    let rotX = 0;   // 绕 X 轴（上下翻转）
    let rotY = 0;   // 绕 Y 轴（左右旋转）
    // 惯性角速度
    let velX = 0;
    let velY = 0;
    // 归位动画
    let isReturning = false;
    let returnStartX = 0;
    let returnStartY = 0;
    let returnProgress = 0;
    const RETURN_FRAMES = 55; // ~0.9秒
    // 拖拽
    let isDraggingHeart = false;
    let dragPrevX = 0;
    let dragPrevY = 0;
    let dragDX = 0;
    let dragDY = 0;
    // 旧兼容 —— 平面旋转已废弃，但 heartRotation 保留供 isPointOnHeartEdge 等使用
    let heartRotation = 0;
    let heartAngularVelocity = 0;

    // ── 内部世界照片 ──
    const innerPhoto = new Image();
    let innerPhotoReady = false;
    const INNER_PHOTO_KEY = 'love-heart-inner-photo-data-url';
    innerPhoto.crossOrigin = 'anonymous';
    innerPhoto.onload = () => { innerPhotoReady = true; };
    (function loadInnerPhoto(){
      try {
        const saved = localStorage.getItem(INNER_PHOTO_KEY);
        if (saved) { innerPhoto.src = saved; return; }
      } catch(e){}
      if (INNER_PHOTO_SRC) innerPhoto.src = INNER_PHOTO_SRC;
    })();
    const innerPhotoInput = document.getElementById('innerPhotoInput');
    innerPhotoInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const url = reader.result;
        try { localStorage.setItem(INNER_PHOTO_KEY, url); } catch(err){}
        innerPhoto.src = url;
      };
      reader.readAsDataURL(file);
      innerPhotoInput.value = '';
    });
    // 按 I 键上传内部世界照片
    window.addEventListener('keydown', (e) => {
      if ((e.key === 'i' || e.key === 'I') && !e.repeat && innerWorldActive) {
        e.preventDefault();
        innerPhotoInput.click();
      }
    });

    // 进入爱心内部世界
    let innerWorldReveal = 0;
    let innerWorldActive = false;
    let innerWorldParticles = [];
    let innerWorldStars = [];
    let innerWorldMeteors = [];
    let innerWorldPetals = [];
    let innerWorldPoems = [];
    let innerWorldTime = 0;
    const INNER_WORLD_LINES = [
      '你是我宇宙里最温柔的一束光',
      '目光绕过银河，最后还是停在你身上',
      '心动不是一瞬，是每次望向你时都重新发生',
      '把岁月折成星光，也想轻轻落在你肩上',
      '若万物皆有归途，我的归途便是你'
    ];

    function initInnerWorld() {
      innerWorldParticles = [];
      innerWorldStars = [];
      innerWorldMeteors = [];
      innerWorldPetals = [];
      innerWorldPoems = [];

      for (let i = 0; i < 236; i++) {
        const arm = i % 2;
        const radius = 0.12 + Math.pow(Math.random(), 0.72) * 0.95;
        const armOffset = arm * Math.PI;
        const angle = armOffset + radius * 4.8 + (Math.random() - 0.5) * 0.6;
        innerWorldParticles.push({
          arm,
          angle,
          radius,
          speed: 0.0022 + Math.random() * 0.0048,
          size: 1.2 + Math.random() * 4.2,
          alpha: 0.30 + Math.random() * 0.70,
          hue: 320 + Math.random() * 52,
          seed: Math.random() * 1000,
          depth: Math.random(),
          lift: (Math.random() - 0.5) * 0.22
        });
      }

      for (let i = 0; i < 58; i++) {
        const big = i < 10;
        innerWorldStars.push({
          x: Math.random(),
          y: Math.random(),
          size: big ? (2.5 + Math.random() * 3.8) : (0.6 + Math.random() * 1.9),
          twinkle: Math.random() * 1000,
          alpha: big ? (0.65 + Math.random() * 0.35) : (0.35 + Math.random() * 0.5),
          big
        });
      }

      for (let i = 0; i < 8; i++) {
        innerWorldMeteors.push({
          progress: Math.random(),
          speed: 0.0035 + Math.random() * 0.004,
          y: 0.10 + Math.random() * 0.55,
          len: 90 + Math.random() * 140,
          alpha: 0.24 + Math.random() * 0.26,
          delay: Math.random() * 1.2,
          seed: Math.random() * 1000
        });
      }

      for (let i = 0; i < 26; i++) {
        const side = i % 4;
        innerWorldPetals.push({
          side,
          progress: Math.random(),
          speed: 0.0018 + Math.random() * 0.0028,
          drift: Math.random() * Math.PI * 2,
          size: 8 + Math.random() * 14,
          alpha: 0.10 + Math.random() * 0.14,
          spin: -0.02 + Math.random() * 0.04,
          rot: Math.random() * Math.PI * 2,
          seed: Math.random() * 1000
        });
      }

      INNER_WORLD_LINES.forEach((line, idx) => {
        const ang = -Math.PI * 0.38 + idx * (Math.PI * 0.19);
        innerWorldPoems.push({
          text: line,
          angle: ang,
          radius: 0.31 + (idx % 2) * 0.04,
          phase: idx * 0.85 + Math.random() * 0.3,
          alpha: 0.14 + Math.random() * 0.08
        });
      });
    }
    initInnerWorld();
    // 旧悬停照片逻辑已移至内部世界（点击中心进入）

    // 你要加自己的歌曲时，只需要把下面这行改成你的文件名，例如 './love.mp3'
    const bgm = new Audio('./your-song.mp3');
    bgm.loop = true;
    bgm.volume = 0.72;

    const musicBtn = document.getElementById('musicBtn');
    const musicIcon = document.getElementById('musicIcon');

    function setMusicBtnState(isPlaying) {
      musicBtn.classList.toggle('playing', isPlaying);
      musicBtn.setAttribute('aria-label', isPlaying ? '暂停音乐' : '播放音乐');
      musicIcon.innerHTML = isPlaying
        ? '<path d="M7 5.5h3.2v13H7zm6.8 0H17v13h-3.2z"></path>'
        : '<path d="M8 6.82v10.36c0 .79.87 1.27 1.54.84l8.07-5.18a1 1 0 0 0 0-1.68L9.54 5.98A1 1 0 0 0 8 6.82Z"></path>';
    }

    async function toggleMusic() {
      try {
        if (bgm.paused) {
          await bgm.play();
          setMusicBtnState(true);
        } else {
          bgm.pause();
          setMusicBtnState(false);
        }
      } catch (err) {
        console.warn('音乐播放失败，请确认歌曲文件路径是否正确。', err);
        setMusicBtnState(false);
      }
    }

    musicBtn.addEventListener('click', toggleMusic);
    bgm.addEventListener('play', () => setMusicBtnState(true));
    bgm.addEventListener('pause', () => setMusicBtnState(false));
    bgm.addEventListener('ended', () => setMusicBtnState(false));

    const pointer = {
      x: -9999,
      y: -9999,
      radius: 180
    };

    const shards = [];
    const glows = [];
    const floaters = [];
    const streamers = [];
    const ambientBits = [];
    const petals = [];
    const SHARD_COUNT = 1220;
    const GLOW_COUNT = 94;
    const FLOATER_COUNT = 34;
    const STREAMER_COUNT = 54;
    const AMBIENT_COUNT = 42;
    const PETAL_COUNT = 24;
    const MESH_LINK_SPAN = 10;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = w / 2;
      cy = h / 2;
      unit = Math.min(w, h) * 0.30;
      buildScene();
    }

    // 2D 心形轮廓（供 drawInnerWorld 等使用）
    function heartPoint(t, s = 1) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      return { x: x * s, y: y * s };
    }

    // ══ 真正的3D立体爱心：挤出法（Extrusion）══
    //
    // 方法：XY平面保持标准心形轮廓，Z方向给予厚度
    // 心形在XY的归一化坐标：x∈[-1,1]，y∈[-0.81,0.44]
    // 厚度：Z方向最大半厚度 = zMax，边缘处收缩为0（圆润轮廓）
    //
    // 归一化：heartPoint(t,1) 除以16 → x∈[-1,1]
    // zMax = 0.35（相对于心形宽度）

    const HNORM = 16; // heartPoint 归一化系数

    // 判断归一化点 (nx,ny) 是否在心形轮廓内部
    // 用射线法：统计从该点向右发出射线与心形轮廓的交叉次数
    function insideHeart2D(nx, ny) {
      // 快速近似：用参数曲线离散采样做点在多边形内判断
      // 注意 heartPoint 已除以 HNORM 归一化
      let inside = false;
      const N = 120;
      let x0 = 0, y0 = 0;
      for (let i = 0; i <= N; i++) {
        const t = (i / N) * Math.PI * 2;
        const h = heartPoint(t, 1);
        const x1 = h.x / HNORM, y1 = h.y / HNORM;
        if (i > 0) {
          if (((y0 > ny) !== (y1 > ny)) &&
              (nx < (x1 - x0) * (ny - y0) / (y1 - y0) + x0)) {
            inside = !inside;
          }
        }
        x0 = x1; y0 = y1;
      }
      return inside;
    }

    // 计算归一化点 (nx,ny) 到心形轮廓的最近距离（用于边缘收缩）
    function distToHeartBoundary(nx, ny) {
      let minD = Infinity;
      const N = 200;
      for (let i = 0; i < N; i++) {
        const t = (i / N) * Math.PI * 2;
        const h = heartPoint(t, 1);
        const d = Math.hypot(nx - h.x / HNORM, ny - h.y / HNORM);
        if (d < minD) minD = d;
      }
      return minD;
    }

    // 预计算心形轮廓多边形（供 insideHeart2D 用，提升性能）
    const _heartPoly = [];
    (function() {
      const N = 200;
      for (let i = 0; i <= N; i++) {
        const h = heartPoint((i / N) * Math.PI * 2, 1);
        _heartPoly.push(h.x / HNORM, h.y / HNORM);
      }
    })();

    function insideHeart2DFast(nx, ny) {
      let inside = false;
      const len = _heartPoly.length;
      let x0 = _heartPoly[len - 2], y0 = _heartPoly[len - 1];
      for (let i = 0; i < len; i += 2) {
        const x1 = _heartPoly[i], y1 = _heartPoly[i + 1];
        if (((y0 > ny) !== (y1 > ny)) &&
            (nx < (x1 - x0) * (ny - y0) / (y1 - y0) + x0)) {
          inside = !inside;
        }
        x0 = x1; y0 = y1;
      }
      return inside;
    }

    // 预计算弧长表，供表面均匀采样
    const _tTable = [], _cumLen = [];
    (function buildArcTable() {
      const N = 400;
      let total = 0, px0 = 0, py0 = 0;
      for (let i = 0; i <= N; i++) {
        const t = (i / N) * Math.PI * 2;
        const h = heartPoint(t, 1);
        if (i > 0) total += Math.hypot(h.x - px0, h.y - py0);
        _tTable.push(t);
        _cumLen.push(total);
        px0 = h.x; py0 = h.y;
      }
      for (let i = 0; i < _cumLen.length; i++) _cumLen[i] /= total;
    })();

    function sampleT() {
      const u = Math.random();
      let lo = 0, hi = _cumLen.length - 1;
      while (lo < hi - 1) {
        const mid = (lo + hi) >> 1;
        if (_cumLen[mid] < u) lo = mid; else hi = mid;
      }
      const frac = (_cumLen[hi] - _cumLen[lo]) > 1e-9
        ? (u - _cumLen[lo]) / (_cumLen[hi] - _cumLen[lo]) : 0;
      return _tTable[lo] + frac * (_tTable[hi] - _tTable[lo]);
    }

    // ── 3D爱心采样：挤出体表面 ──
    // 表面分为：前面(z>0)、后面(z<0)、侧边(轮廓附近)
    const Z_THICK = 0.28;   // 半厚度（归一化，爱心宽度的28%）

    // Z方向截面形状：椭圆弧，边缘收缩为0
    // d = 点到心形中心轴的距离比例（0=中心，1=边缘）
    function zProfile(d) {
      // 半圆弧截面：z_max * sqrt(1 - d²)
      return Z_THICK * Math.sqrt(Math.max(0, 1 - d * d));
    }

    // 采样前面/后面
    function sampleHeart3DFace(isFront) {
      // 在心形内部随机采样 (nx, ny)
      for (let attempt = 0; attempt < 200; attempt++) {
        const nx = rand(-1.02, 1.02);
        const ny = rand(-0.84, 0.46);
        if (!insideHeart2DFast(nx, ny)) continue;
        // 计算该点到边界的距离，决定 z 抖动
        // 前面 z 略微凸出，后面 z 略微凹进
        const zSign = isFront ? 1 : -1;
        const zJitter = rand(0, Z_THICK * 0.18); // 面有轻微起伏
        return {
          x: nx,
          y: ny,
          z: zSign * (Z_THICK * 0.82 + zJitter),
          isFace: true
        };
      }
      return { x: 0, y: -0.1, z: isFront ? Z_THICK : -Z_THICK, isFace: true };
    }

    // 采样侧边（轮廓边缘环绕面）
    function sampleHeart3DEdge() {
      const t  = sampleT();           // 轮廓上的点
      const h  = heartPoint(t, 1);
      const nx = h.x / HNORM;
      const ny = h.y / HNORM;
      // z 从 -Z_THICK 到 +Z_THICK 均匀分布
      const z  = rand(-Z_THICK, Z_THICK);
      // 法线方向（轮廓切线的垂线）做一点抖动
      const jitter = rand(-0.015, 0.015);
      const dt = 0.05;
      const h2 = heartPoint(t + dt, 1);
      const tx = (h2.x - h.x) / HNORM, ty = (h2.y - h.y) / HNORM;
      const len = Math.hypot(tx, ty) || 1;
      const nx2 = ty / len, ny2 = -tx / len; // 内法线
      return {
        x: nx + nx2 * jitter,
        y: ny + ny2 * jitter,
        z,
        isEdge: true
      };
    }

    // 采样内部体积（填充感）
    function sampleHeart3DInner() {
      for (let attempt = 0; attempt < 220; attempt++) {
        const nx = rand(-1.02, 1.02);
        const ny = Math.random() < 0.62 ? rand(-0.72, 0.08) : rand(-0.84, 0.46);
        if (!insideHeart2DFast(nx, ny)) continue;
        const lowerBias = Math.max(0, Math.min(1, (0.12 - ny) / 0.96));
        const zRange = Z_THICK * (0.56 + lowerBias * 0.26);
        const z = rand(-zRange, zRange);
        return { x: nx, y: ny, z, depth: Math.abs(z) / Z_THICK };
      }
      return { x: 0, y: -0.14, z: 0, depth: 0 };
    }

    // 统一采样接口（供 buildScene 调用）
    function sampleHeart3DSurface() {
      const r = Math.random();
      if (r < 0.38)      return sampleHeart3DFace(true);   // 前面
      else if (r < 0.70) return sampleHeart3DEdge();        // 侧边
      else               return sampleHeart3DFace(false);   // 后面
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function buildScene() {
      shards.length = 0;
      glows.length = 0;
      floaters.length = 0;
      streamers.length = 0;
      ambientBits.length = 0;
      petals.length = 0;

      // ══ 参数化 3D 爱心表面 + 内部体积粒子 ══
      // 坐标已归一化到 [-1,1]（在 sampleHeart3DSurface/Inner 内完成）
      const SURFACE_RATIO = 0.68; // 68%表面，32%内部体积

      for (let i = 0; i < SHARD_COUNT; i++) {
        const isSurface = Math.random() < SURFACE_RATIO;
        let p;
        if (isSurface) {
          p = sampleHeart3DSurface();
        } else {
          p = sampleHeart3DInner();
        }

        // 坐标已在采样函数中归一化
        const nx = p.x, ny = p.y, nz = p.z;
        const dist3 = Math.hypot(nx, ny, nz);

        const isOuterShell = isSurface;
        const isInnerLayer = !isSurface && (p.depth || 0) < 0.4;
        const isMidBand    = !isOuterShell && !isInnerLayer;

        const isBigShard  = Math.random() < (isOuterShell ? 0.08 : 0.03);
        const isTinyShard = !isBigShard && Math.random() < (isInnerLayer ? 0.35 : 0.18);

        shards.push({
          seed: Math.random() * 1000,
          b3x: nx, b3y: ny, b3z: nz,
          baseX: p.x, baseY: p.y,
          depth: dist3,
          isOuterShell, isInnerLayer,
          rot: rand(0, Math.PI * 2),
          spin: rand(-0.008, 0.008),
          size: isBigShard
            ? rand(5, 9)
            : (isTinyShard
              ? rand(1.0, 2.5)
              : (isOuterShell ? rand(2.8, 6.0) : rand(1.8, 4.2))),
          stretch: isBigShard ? rand(1.0, 1.8) : rand(0.7, 1.45),
          brightness: isOuterShell
            ? rand(0.85, 1.18)
            : (isMidBand ? rand(0.55, 0.92) : rand(0.30, 0.72)),
          alpha: isOuterShell
            ? rand(0.42, 0.90)
            : (isMidBand ? rand(0.25, 0.55) : rand(0.15, 0.35)),
          drift: rand(0.3, 1.0),
          fragility: isOuterShell ? rand(0.35, 0.75) : rand(0.6, 1.4),
          layerLift: rand(0.1, 0.8),
          isBigShard, isTinyShard,
          x: cx, y: cy, vx: 0, vy: 0,
          projZ: 0, projScale: 1,
          flicker: rand(0.2, 1.2)
        });
      }

      // 不再按角度排序（3D下无意义），保持随机顺序
      // drawShards 里按 projZ 动态排序

      // Glows：贴在表面外侧
      for (let i = 0; i < GLOW_COUNT; i++) {
        const p = sampleHeart3DSurface();
        const sc = rand(1.04, 1.18);
        glows.push({
          seed: Math.random() * 1000,
          b3x: p.x * sc,
          b3y: p.y * sc,
          b3z: p.z * sc,
          baseX: p.x * 16, baseY: p.y * 16,
          size: rand(12, 38),
          alpha: rand(0.04, 0.16),
          drift: rand(0.3, 1.0)
        });
      }

      // Floaters：在表面外轨道漂浮
      for (let i = 0; i < FLOATER_COUNT; i++) {
        const p = sampleHeart3DSurface();
        const sc = rand(1.08, 1.25);
        floaters.push({
          seed: Math.random() * 1000,
          b3x: p.x * sc,
          b3y: p.y * sc,
          b3z: p.z * sc,
          baseX: p.x * 16 * sc, baseY: p.y * 16 * sc,
          rot: rand(0, Math.PI * 2),
          spin: rand(-0.01, 0.01),
          size: rand(1.5, 5.0),
          stretch: rand(0.8, 1.7),
          alpha: rand(0.10, 0.26),
          brightness: rand(0.68, 1.08),
          drift: rand(0.5, 1.3),
          x: cx, y: cy, vx: 0, vy: 0
        });
      }

      for (let i = 0; i < STREAMER_COUNT; i++) {
        streamers.push({
          seed: Math.random() * 1000,
          lane: rand(-0.30, 0.26),
          offset: Math.random(),
          speed: rand(0.050, 0.11),
          size: rand(1.2, 4.2),
          stretch: rand(1.0, 2.1),
          alpha: rand(0.10, 0.28),
          brightness: rand(0.72, 1.12),
          wobble: rand(0.6, 1.4),
          x: 0, y: 0,
          rot: rand(-0.18, 0.18)
        });
      }

      for (let i = 0; i < AMBIENT_COUNT; i++) {
        const edgeMode = Math.random() < 0.68;
        const side = Math.floor(Math.random() * 4);
        const x = edgeMode
          ? (side % 2 === 0 ? rand(0, w * 0.18) : rand(w * 0.82, w))
          : Math.random() * w;
        const y = edgeMode
          ? (side < 2 ? rand(0, h * 0.24) : rand(h * 0.76, h))
          : Math.random() * h;
        ambientBits.push({
          seed: Math.random() * 1000,
          x, y,
          size: edgeMode ? rand(16, 34) : rand(10, 26), alpha: edgeMode ? rand(0.04, 0.11) : rand(0.025, 0.07),
          drift: rand(0.10, 0.38), stretch: rand(0.8, 1.9),
          rot: rand(0, Math.PI * 2)
        });
      }

      for (let i = 0; i < PETAL_COUNT; i++) {
        petals.push({
          seed: Math.random() * 1000,
          x: Math.random() * w, y: Math.random() * h,
          size: rand(7, 16), alpha: rand(0.04, 0.10),
          driftX: rand(0.10, 0.32), driftY: rand(0.28, 0.62),
          rot: rand(0, Math.PI * 2), spin: rand(-0.01, 0.01),
          petal: Math.random() < 0.55
        });
      }
    }
    function colorForShard(b, a, depth = 0.5, angle = 0, isInnerLayer = false) {
      const hot = Math.min(1, Math.max(0, b));
      const angleMix = (Math.sin(angle) + 1) * 0.5;
      const depthMix = Math.min(1, Math.max(0, depth));

      // 渐变逻辑：外壳更亮偏鲜红，中层偏玫红酒红，内层更暗更透
      const r = Math.floor(120 + 70 * hot + 42 * depthMix + 16 * angleMix);
      const g = Math.floor(8 + 20 * hot + 6 * angleMix);
      const blue = Math.floor(14 + 16 * (1 - depthMix) + 18 * angleMix);

      const innerFade = isInnerLayer ? a * 0.88 : a;
      return `rgba(${r}, ${g}, ${blue}, ${innerFade})`;
    }

    // ── 3D 透视投影 ──
    // lx/ly/lz 已是屏幕像素尺度（scale3D = unit*0.30）
    function project3D(lx, ly, lz) {
      // 绕 Y 轴旋转 rotY（左右）
      const cy2 = Math.cos(rotY), sy2 = Math.sin(rotY);
      const x1 = lx * cy2 + lz * sy2;
      const z1 = -lx * sy2 + lz * cy2;
      // 绕 X 轴旋转 rotX（上下）
      const cx2 = Math.cos(rotX), sx2 = Math.sin(rotX);
      const y1 = ly * cx2 - z1 * sx2;
      const z2 = ly * sx2 + z1 * cx2;
      // 透视除法：焦距 = 2.2 * unit，近大远小效果明显
      const fov = unit * 3.5;
      const scale = fov / (fov + z2);
      return { sx: cx + x1 * scale, sy: cy + y1 * scale, scale, z: z2 };
    }

    function updateShard(s, pulse, dt) {
      const breathing = 1 + 0.045 * pulse;
      // 挤出爱心：x∈[-1,1]，y∈[-0.84,0.46]，z∈[-0.28,0.28]
      // 让心形宽度 = unit * 1.55（充满视口，有余量）
      const scale3D = unit * 0.78 * breathing;

      const lx = s.b3x * scale3D;
      const ly = s.b3y * scale3D;
      const lz = s.b3z * scale3D;

      const proj = project3D(lx, ly, lz);
      const tx = proj.sx;
      const ty = proj.sy;

      // 鼠标斥力
      const dxp = tx - pointer.x;
      const dyp = ty - pointer.y;
      const dist = Math.hypot(dxp, dyp);
      let repelX = 0, repelY = 0;
      if (dist < pointer.radius) {
        const p2 = (1 - dist / pointer.radius);
        const ang = Math.atan2(dyp, dxp);
        repelX = Math.cos(ang) * p2 * 30;
        repelY = Math.sin(ang) * p2 * 30;
      }

      s.vx += ((tx + repelX) - s.x) * 0.055 * dt;
      s.vy += ((ty + repelY) - s.y) * 0.055 * dt;
      s.vx *= 0.86; s.vy *= 0.86;
      s.x += s.vx; s.y += s.vy;
      s.projZ     = proj.z;
      s.projScale = proj.scale;
      s.rot += s.spin * dt;
    }

    function updateFloater(f, pulse, dt) {
      const scale3D = unit * 0.78 * (1 + 0.04 * pulse);
      const lx = f.b3x * scale3D + Math.sin(time * (0.8 + f.drift) + f.seed) * 7;
      const ly = f.b3y * scale3D + Math.cos(time * (1.0 + f.drift) + f.seed) * 7;
      const lz = f.b3z * scale3D;
      const proj = project3D(lx, ly, lz);
      f.vx += (proj.sx - f.x) * 0.035 * dt;
      f.vy += (proj.sy - f.y) * 0.035 * dt;
      f.vx *= 0.92; f.vy *= 0.92;
      f.x += f.vx; f.y += f.vy;
      f.rot += f.spin * dt;
    }

    function updateStreamer(s) {
      const probe = ((time * s.speed) + s.offset) % 1;
      const probeX = cx + (-1.12 + probe * 2.24) * unit * 0.92;
      const probeY = cy + (s.lane + Math.sin(time * (1.5 + s.wobble) + s.seed) * 0.055) * unit * 0.72;
      const nearHeart = Math.max(0, 1 - Math.hypot((probeX - cx) / (unit * 0.70), (probeY - (cy + unit * 0.02)) / (unit * 0.52)));
      const speedBoost = 1 + nearHeart * 0.42;
      const progress = ((time * s.speed * speedBoost) + s.offset) % 1;
      const xNorm = -1.12 + progress * 2.24;
      const yWave = s.lane + Math.sin(time * (1.5 + s.wobble) + s.seed) * 0.055;
      s.x = cx + xNorm * unit * 0.92;
      s.y = cy + yWave * unit * 0.72;
      s.rot = 0.10 + Math.sin(time * 1.8 + s.seed) * 0.08;
      s.progress = progress;
      s.nearHeart = nearHeart;
    }

    function drawBackground(pulse) {
      ctx.clearRect(0, 0, w, h);

      const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.72);
      bg.addColorStop(0, `rgba(255,70,70,${0.14 + pulse * 0.05})`);
      bg.addColorStop(0.24, 'rgba(255,0,70,0.12)');
      bg.addColorStop(0.58, 'rgba(120,0,30,0.10)');
      bg.addColorStop(1, 'rgba(10,0,0,0.44)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < 14; i++) {
        const x = (Math.sin(time * 0.17 + i * 12.7) * 0.5 + 0.5) * w;
        const y = (Math.cos(time * 0.12 + i * 9.4) * 0.5 + 0.5) * h;
        const r = 60 + (i % 4) * 22;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, 'rgba(255,34,48,0.06)');
        g.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }


    function drawEdgeAura(pulse) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const corners = [
        [0.08 * w, 0.12 * h, Math.min(w, h) * 0.32],
        [0.92 * w, 0.14 * h, Math.min(w, h) * 0.30],
        [0.10 * w, 0.86 * h, Math.min(w, h) * 0.34],
        [0.90 * w, 0.84 * h, Math.min(w, h) * 0.32]
      ];
      for (const [x, y, r] of corners) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r * (1 + pulse * 0.06));
        g.addColorStop(0, `rgba(255,96,132,${0.042 + pulse * 0.015})`);
        g.addColorStop(0.35, `rgba(255,46,90,${0.020 + pulse * 0.010})`);
        g.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const veilTop = ctx.createLinearGradient(0, 0, 0, h * 0.24);
      veilTop.addColorStop(0, `rgba(255,95,128,${0.050 + pulse * 0.012})`);
      veilTop.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = veilTop;
      ctx.fillRect(0, 0, w, h * 0.24);

      const veilBottom = ctx.createLinearGradient(0, h, 0, h * 0.72);
      veilBottom.addColorStop(0, `rgba(255,86,122,${0.044 + pulse * 0.014})`);
      veilBottom.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = veilBottom;
      ctx.fillRect(0, h * 0.72, w, h * 0.28);
      ctx.restore();
    }

    function drawHUD(pulse) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      for (let y = 0; y < h; y += 7) {
        const a = 0.010 + 0.006 * Math.sin(time * 1.4 + y * 0.025);
        ctx.strokeStyle = `rgba(255, 70, 82, ${a})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(w, y + 0.5);
        ctx.stroke();
      }

      for (let x = 0; x < w; x += 120) {
        ctx.strokeStyle = 'rgba(255, 60, 76, 0.03)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, h);
        ctx.stroke();
      }

      const m = 28;
      const len = 26;
      ctx.strokeStyle = `rgba(255, 92, 104, ${0.12 + pulse * 0.03})`;
      ctx.lineWidth = 1;
      const corners = [
        [m, m, 1, 1],
        [w - m, m, -1, 1],
        [m, h - m, 1, -1],
        [w - m, h - m, -1, -1]
      ];
      for (const [x, y, sx, sy] of corners) {
        ctx.beginPath();
        ctx.moveTo(x, y + len * sy);
        ctx.lineTo(x, y);
        ctx.lineTo(x + len * sx, y);
        ctx.stroke();
      }

      const scanY = (time * 70) % (h + 80) - 40;
      const scanGrad = ctx.createLinearGradient(0, scanY - 12, 0, scanY + 12);
      scanGrad.addColorStop(0, 'rgba(255,0,0,0)');
      scanGrad.addColorStop(0.5, 'rgba(255,90,100,0.05)');
      scanGrad.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = scanGrad;
      ctx.fillRect(0, scanY - 12, w, 24);

      ctx.restore();
    }



    function drawOuterHalo(pulse) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';

      const haloR = unit * 1.05 * (1 + 0.025 * pulse);
      const hg = ctx.createRadialGradient(cx, cy - unit * 0.05, 0, cx, cy - unit * 0.05, haloR);
      hg.addColorStop(0, 'rgba(255,0,0,0)');
      hg.addColorStop(0.52, 'rgba(255,0,0,0)');
      hg.addColorStop(0.70, `rgba(255,60,80,${0.04 + pulse * 0.015})`);
      hg.addColorStop(0.85, `rgba(220,20,50,${0.07 + pulse * 0.02})`);
      hg.addColorStop(0.94, 'rgba(180,10,30,0.04)');
      hg.addColorStop(1, 'rgba(100,0,10,0)');
      ctx.fillStyle = hg;
      ctx.beginPath();
      ctx.arc(cx, cy - unit * 0.05, haloR, 0, Math.PI * 2);
      ctx.fill();

      const textAlpha = 0.12 + pulse * 0.04;
      ctx.font = `${Math.max(11, Math.floor(unit * 0.052))}px "STKaiti","KaiTi",cursive`;
      ctx.fillStyle = 'rgba(255,200,215,0.9)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const sideX1 = cx - unit * 1.12;
      const sideX2 = cx + unit * 1.12;
      const leftPhrases = ['❤', '爱', '♡', '永恒', '♡', '恒', '❤'];
      const rightPhrases = ['❤', '情', '♡', '恒永', '♡', '永', '❤'];

      for (let i = 0; i < leftPhrases.length; i++) {
        const yOff = (i - 3) * unit * 0.17;
        const flicker = 0.6 + 0.4 * Math.sin(time * 0.9 + i * 1.3);
        ctx.globalAlpha = textAlpha * flicker;
        ctx.fillText(leftPhrases[i], sideX1, cy + yOff);
        ctx.fillText(rightPhrases[i], sideX2, cy + yOff);
      }

      ctx.restore();
    }

    function drawGlowShell(pulse) {
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      const scale3D = unit * 0.78 * (1 + 0.04 * pulse);
      for (const g of glows) {
        const lx = g.b3x * scale3D + Math.sin(time * (0.7 + g.drift) + g.seed) * 4;
        const ly = g.b3y * scale3D + Math.cos(time * (0.9 + g.drift) + g.seed) * 4;
        const lz = g.b3z * scale3D;
        const proj = project3D(lx, ly, lz);
        const gx = proj.sx, gy = proj.sy;
        const radius = g.size * (1 + Math.sin(time * 1.6 + g.seed) * 0.12);
        const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, radius);
        grad.addColorStop(0, 'rgba(190,48,58,0.18)');
        grad.addColorStop(0.22, 'rgba(132,20,34,0.12)');
        grad.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(gx, gy, radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawMesh(pulse) {
      const maxLink = 24 + pulse * 3;
      for (let i = 0; i < shards.length; i += 1) {
        const a = shards[i];
        let linked = 0;
        for (let step = 1; step <= MESH_LINK_SPAN && linked < 2; step++) {
          const b = shards[(i + step) % shards.length];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.hypot(dx, dy);
          const depthClose = 1 - Math.min(1, Math.abs(a.depth - b.depth) * 2.2);
          if (dist < maxLink && depthClose > 0.3) {
            const alpha = (1 - dist / maxLink) * 0.18 * depthClose;
            ctx.strokeStyle = `rgba(${178 + Math.floor((a.depth + b.depth) * 16)}, ${18 + Math.floor((a.depth + b.depth) * 6)}, ${28 + Math.floor((1 - (a.depth + b.depth) * 0.5) * 10)}, ${alpha})`;
            ctx.lineWidth = 0.45 + ((a.depth + b.depth) * 0.22);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
            linked++;
          }
        }
      }
    }

    function drawInnerNetwork(pulse) {
      const inner = shards.filter(s => s.depth < 0.65);
      const maxLink = 34 + pulse * 5;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      for (let i = 0; i < inner.length; i += 3) {
        const a = inner[i];
        let linked = 0;
        for (let j = i + 1; j < Math.min(inner.length, i + 12) && linked < 3; j++) {
          const b = inner[j];
          const ay = a.y + (1 - a.depth) * 8;
          const by = b.y + (1 - b.depth) * 8;
          const dx = a.x - b.x;
          const dy = ay - by;
          const dist = Math.hypot(dx, dy);
          if (dist < maxLink) {
            const baseAlpha = (1 - dist / maxLink) * 0.15;
            const ctrlX = (a.x + b.x) * 0.5 + Math.sin(time * 1.1 + a.seed + b.seed) * 5;
            const ctrlY = (ay + by) * 0.5 - 4;
            const lane = ((Math.floor((a.seed + b.seed) * 10) % 6) + 6) % 6;
            const wave = (Math.sin(time * 3.6 - lane * 0.9) + 1) * 0.5;
            const beatBoost = Math.pow(Math.max(0, Math.sin(beatPhase * Math.PI)), 1.5);
            const energy = Math.min(1, 0.3 + wave * 0.8 + beatBoost * 0.7);
            const alpha = baseAlpha * energy;

            ctx.strokeStyle = `rgba(255, ${70 + Math.floor(((a.depth + b.depth) * 0.5) * 20)}, ${76 + Math.floor((1 - (a.depth + b.depth) * 0.5) * 12)}, ${alpha})`;
            ctx.lineWidth = 0.45 + energy * 0.55;
            ctx.beginPath();
            ctx.moveTo(a.x, ay);
            ctx.quadraticCurveTo(ctrlX, ctrlY, b.x, by);
            ctx.stroke();

            const t = (time * 0.8 + lane * 0.17) % 1;
            const omt = 1 - t;
            const px = omt * omt * a.x + 2 * omt * t * ctrlX + t * t * b.x;
            const py = omt * omt * ay + 2 * omt * t * ctrlY + t * t * by;
            ctx.fillStyle = `rgba(255, 225, 225, ${alpha * 0.9})`;
            ctx.beginPath();
            ctx.arc(px, py, 1.1 + energy * 0.9, 0, Math.PI * 2);
            ctx.fill();
            linked++;
          }
        }
      }

      ctx.restore();
    }

    function drawTriangle(x, y, size, angle, stretch, fillStyle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.scale(stretch, 1);
      ctx.fillStyle = fillStyle;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.88, size * 0.72);
      ctx.lineTo(-size * 0.88, size * 0.72);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawGlassHighlight(x, y, size, angle, stretch, alpha, isBigShard = false) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.scale(stretch, 1);

      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(size * 0.88, size * 0.72);
      ctx.lineTo(-size * 0.88, size * 0.72);
      ctx.closePath();
      ctx.clip();

      const shine = ctx.createLinearGradient(-size * 0.9, -size * 0.8, size * 0.7, size * 0.9);
      shine.addColorStop(0, `rgba(255, 250, 250, ${alpha * (isBigShard ? 0.24 : 0.16)})`);
      shine.addColorStop(0.24, `rgba(255, 185, 195, ${alpha * 0.12})`);
      shine.addColorStop(0.48, `rgba(255, 110, 130, 0)`);
      shine.addColorStop(0.72, `rgba(255, 150, 170, ${alpha * 0.05})`);
      shine.addColorStop(1, `rgba(255, 255, 255, ${alpha * (isBigShard ? 0.12 : 0.07)})`);
      ctx.fillStyle = shine;
      ctx.fillRect(-size * 1.2, -size * 1.2, size * 2.4, size * 2.4);

      const edgeGlow = ctx.createLinearGradient(-size * 0.5, -size, size * 0.5, size * 0.7);
      edgeGlow.addColorStop(0, `rgba(255,255,255,${alpha * 0.16})`);
      edgeGlow.addColorStop(0.35, `rgba(255,205,215,${alpha * 0.08})`);
      edgeGlow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = edgeGlow;
      ctx.lineWidth = isBigShard ? 1.1 : 0.6;
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.96);
      ctx.lineTo(size * 0.82, size * 0.66);
      ctx.lineTo(-size * 0.82, size * 0.66);
      ctx.closePath();
      ctx.stroke();

      if (isBigShard) {
        ctx.strokeStyle = `rgba(255,245,248,${alpha * 0.16})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(-size * 0.12, -size * 0.48);
        ctx.lineTo(size * 0.26, -size * 0.02);
        ctx.lineTo(size * 0.08, size * 0.32);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawFloaters(pulse) {
      ctx.save();
      for (const f of floaters) {
        const alpha = f.alpha * (0.8 + 0.2 * Math.sin(time * 1.8 + f.seed));
        const size = f.size * (0.9 + 0.18 * Math.sin(time * (1.1 + f.drift) + f.seed));

        const glow = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, size * 2.2);
        glow.addColorStop(0, colorForShard(f.brightness + 0.08, alpha * 0.14, 0.95, Math.atan2(f.y - cy, f.x - cx), false));
        glow.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(f.x, f.y, size * 2.2, 0, Math.PI * 2);
        ctx.fill();
        drawTriangle(f.x, f.y, size, f.rot, f.stretch, colorForShard(f.brightness, alpha, 0.95, Math.atan2(f.y - cy, f.x - cx), false));
      }
      ctx.restore();
    }

    function drawStreamers() {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const s of streamers) {
        const nearHeart = s.nearHeart || 0;
        const fade = Math.sin(Math.PI * s.progress);
        const alpha = s.alpha * (0.45 + fade * 0.95) * (1 + nearHeart * 0.55);
        const size = s.size * (0.92 + fade * 0.5 + nearHeart * 0.22);

        const trail = ctx.createLinearGradient(s.x - size * 7.2, s.y, s.x + size * 2.6, s.y);
        trail.addColorStop(0, `rgba(255, 236, 240, ${alpha * 0.02})`);
        trail.addColorStop(0.18, `rgba(255, 176, 188, ${alpha * 0.10})`);
        trail.addColorStop(0.52, `rgba(255, 82, 108, ${alpha * 0.18})`);
        trail.addColorStop(1, `rgba(255, 214, 222, ${alpha * 0.03})`);
        ctx.strokeStyle = trail;
        ctx.lineWidth = 0.8 + nearHeart * 0.45;
        ctx.beginPath();
        ctx.moveTo(s.x - size * 6.6, s.y);
        ctx.lineTo(s.x + size * 2.2, s.y);
        ctx.stroke();

        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, size * 3.1);
        glow.addColorStop(0, colorForShard(s.brightness + 0.16 + nearHeart * 0.12, alpha * 0.24, 0.9, 0.18, false));
        glow.addColorStop(0.45, `rgba(255, 90, 116, ${alpha * 0.13})`);
        glow.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(s.x, s.y, size * 3.1, 0, Math.PI * 2);
        ctx.fill();

        const shardGrad = ctx.createLinearGradient(s.x - size * 1.1, s.y - size, s.x + size * 1.1, s.y + size);
        shardGrad.addColorStop(0, `rgba(255, 248, 250, ${alpha * 0.70})`);
        shardGrad.addColorStop(0.28, `rgba(255, 198, 210, ${alpha * 0.86})`);
        shardGrad.addColorStop(0.68, `rgba(255, 90, 120, ${alpha * 0.95})`);
        shardGrad.addColorStop(1, `rgba(188, 26, 44, ${alpha * 0.82})`);
        drawTriangle(s.x, s.y, size, s.rot, s.stretch, shardGrad);
      }
      ctx.restore();
    }

    function drawAmbientBits() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (const a of ambientBits) {
        const x = (a.x + Math.sin(time * a.drift + a.seed) * 16 + w) % w;
        const y = (a.y + Math.cos(time * (a.drift * 0.8) + a.seed) * 10 + h) % h;
        const glow = ctx.createRadialGradient(x, y, 0, x, y, a.size);
        glow.addColorStop(0, `rgba(255, 110, 126, ${a.alpha})`);
        glow.addColorStop(0.5, `rgba(255, 58, 82, ${a.alpha * 0.35})`);
        glow.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(x, y, a.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(a.rot + Math.sin(time * 0.4 + a.seed) * 0.12);
        ctx.scale(a.stretch, 1);
        ctx.strokeStyle = `rgba(255, 212, 220, ${a.alpha * 0.28})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(-a.size * 0.18, 0);
        ctx.lineTo(a.size * 0.18, 0);
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawPetals() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (const p of petals) {
        p.y = (p.y + p.driftY) % (h + 40);
        p.x = (p.x + Math.sin(time * 0.8 + p.seed) * p.driftX + w) % (w + 20);
        p.rot += p.spin;

        ctx.save();
        ctx.translate(p.x, p.y - 20);
        ctx.rotate(p.rot + Math.sin(time * 0.7 + p.seed) * 0.2);
        ctx.globalAlpha = p.alpha;

        if (p.petal) {
          const grad = ctx.createLinearGradient(-p.size * 0.6, -p.size, p.size * 0.6, p.size);
          grad.addColorStop(0, 'rgba(255, 246, 248, 0.9)');
          grad.addColorStop(0.45, 'rgba(255, 198, 212, 0.7)');
          grad.addColorStop(1, 'rgba(255, 126, 150, 0.0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(0, -p.size * 0.9);
          ctx.bezierCurveTo(p.size * 0.8, -p.size * 0.4, p.size * 0.7, p.size * 0.7, 0, p.size);
          ctx.bezierCurveTo(-p.size * 0.7, p.size * 0.7, -p.size * 0.8, -p.size * 0.4, 0, -p.size * 0.9);
          ctx.fill();
        } else {
          const grad = ctx.createLinearGradient(-p.size, -p.size, p.size, p.size);
          grad.addColorStop(0, 'rgba(255,255,255,0.65)');
          grad.addColorStop(0.4, 'rgba(255,180,196,0.28)');
          grad.addColorStop(1, 'rgba(255,0,0,0)');
          ctx.strokeStyle = grad;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(-p.size * 0.65, 0);
          ctx.lineTo(0, -p.size * 0.65);
          ctx.lineTo(p.size * 0.65, 0);
          ctx.lineTo(0, p.size * 0.65);
          ctx.closePath();
          ctx.stroke();
        }
        ctx.restore();
      }
      ctx.restore();
    }

    function drawDecorFrame() {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const m = 22;
      const len = 70;
      const s = 16;
      const corners = [
        [m, m, 1, 1],
        [w - m, m, -1, 1],
        [m, h - m, 1, -1],
        [w - m, h - m, -1, -1]
      ];

      for (const [x, y, sx, sy] of corners) {
        const grad = ctx.createLinearGradient(x, y, x + len * sx, y + len * sy);
        grad.addColorStop(0, 'rgba(255, 236, 220, 0.14)');
        grad.addColorStop(0.5, 'rgba(255, 170, 178, 0.10)');
        grad.addColorStop(1, 'rgba(255, 90, 112, 0.02)');
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1;

        ctx.beginPath();
        ctx.moveTo(x, y + len * sy);
        ctx.lineTo(x, y);
        ctx.lineTo(x + len * sx, y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x + s * sx, y + 3 * sy);
        ctx.lineTo(x + (s + 10) * sx, y + 3 * sy);
        ctx.moveTo(x + 3 * sx, y + s * sy);
        ctx.lineTo(x + 3 * sx, y + (s + 10) * sy);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawCenterTitle() {
      const inside = isPointInCenterRevealZone(pointer.x, pointer.y);
      titleReveal += ((inside ? 1 : 0) - titleReveal) * (inside ? 0.075 : 0.045);
      if (titleReveal < 0.012) return;

      const reveal  = titleReveal * titleReveal * (3 - 2 * titleReveal);
      const breathe = Math.sin(time * 1.6) * unit * 0.010 * reveal;
      const textY   = cy + unit * 0.03 + breathe;

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      // 中心光晕
      const coreGlow = ctx.createRadialGradient(cx, textY, 0, cx, textY, unit * (0.08 + reveal * 0.16));
      coreGlow.addColorStop(0,  `rgba(255, 244, 232, ${0.12 + reveal * 0.18})`);
      coreGlow.addColorStop(0.24, `rgba(255, 196, 160, ${0.09 + reveal * 0.16})`);
      coreGlow.addColorStop(1,  'rgba(255,0,0,0)');
      ctx.fillStyle = coreGlow;
      ctx.beginPath();
      ctx.arc(cx, textY, unit * (0.08 + reveal * 0.16), 0, Math.PI * 2);
      ctx.fill();

      // 文字
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font         = `${Math.max(26, Math.floor(unit * 0.18))}px "STKaiti","KaiTi","DFKai-SB",cursive`;
      ctx.shadowColor  = `rgba(255, 156, 120, ${0.34 * reveal})`;
      ctx.shadowBlur   = 20;
      const grad = ctx.createLinearGradient(cx - unit * 0.22, textY - unit * 0.06, cx + unit * 0.22, textY + unit * 0.06);
      grad.addColorStop(0,    `rgba(255, 248, 238, ${0.98 * reveal})`);
      grad.addColorStop(0.24, `rgba(255, 228, 200, ${0.99 * reveal})`);
      grad.addColorStop(0.56, `rgba(255, 198, 154, ${0.99 * reveal})`);
      grad.addColorStop(0.82, `rgba(244, 150, 112, ${0.98 * reveal})`);
      grad.addColorStop(1,    `rgba(255, 230, 214, ${0.96 * reveal})`);
      ctx.fillStyle = grad;
      ctx.fillText('爱晓玲', cx, textY);

      ctx.lineWidth   = 0.9;
      ctx.strokeStyle = `rgba(255, 252, 246, ${0.16 * reveal})`;
      ctx.strokeText('爱晓玲', cx, textY);
      ctx.restore();
    }

    function drawButterflyGlow(x, y, scale, angle, alpha) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.globalCompositeOperation = 'lighter';

      const wingGradL = ctx.createRadialGradient(-scale * 0.52, -scale * 0.10, 0, -scale * 0.52, -scale * 0.10, scale * 0.95);
      wingGradL.addColorStop(0, `rgba(255,250,252,${alpha * 0.95})`);
      wingGradL.addColorStop(0.42, `rgba(255,182,214,${alpha * 0.85})`);
      wingGradL.addColorStop(1, 'rgba(255,120,180,0)');
      ctx.fillStyle = wingGradL;
      ctx.beginPath();
      ctx.ellipse(-scale * 0.48, -scale * 0.08, scale * 0.42, scale * 0.66, -0.55, 0, Math.PI * 2);
      ctx.fill();

      const wingGradR = ctx.createRadialGradient(scale * 0.52, -scale * 0.10, 0, scale * 0.52, -scale * 0.10, scale * 0.95);
      wingGradR.addColorStop(0, `rgba(255,250,252,${alpha * 0.95})`);
      wingGradR.addColorStop(0.42, `rgba(255,182,214,${alpha * 0.85})`);
      wingGradR.addColorStop(1, 'rgba(255,120,180,0)');
      ctx.fillStyle = wingGradR;
      ctx.beginPath();
      ctx.ellipse(scale * 0.48, -scale * 0.08, scale * 0.42, scale * 0.66, 0.55, 0, Math.PI * 2);
      ctx.fill();

      const wingGradLB = ctx.createRadialGradient(-scale * 0.30, scale * 0.42, 0, -scale * 0.30, scale * 0.42, scale * 0.70);
      wingGradLB.addColorStop(0, `rgba(255,232,242,${alpha * 0.72})`);
      wingGradLB.addColorStop(0.5, `rgba(255,152,198,${alpha * 0.56})`);
      wingGradLB.addColorStop(1, 'rgba(255,120,180,0)');
      ctx.fillStyle = wingGradLB;
      ctx.beginPath();
      ctx.ellipse(-scale * 0.28, scale * 0.42, scale * 0.28, scale * 0.42, -0.42, 0, Math.PI * 2);
      ctx.fill();

      const wingGradRB = ctx.createRadialGradient(scale * 0.30, scale * 0.42, 0, scale * 0.30, scale * 0.42, scale * 0.70);
      wingGradRB.addColorStop(0, `rgba(255,232,242,${alpha * 0.72})`);
      wingGradRB.addColorStop(0.5, `rgba(255,152,198,${alpha * 0.56})`);
      wingGradRB.addColorStop(1, 'rgba(255,120,180,0)');
      ctx.fillStyle = wingGradRB;
      ctx.beginPath();
      ctx.ellipse(scale * 0.28, scale * 0.42, scale * 0.28, scale * 0.42, 0.42, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = `rgba(255,245,248,${alpha * 0.72})`;
      ctx.lineWidth = Math.max(1, scale * 0.10);
      ctx.beginPath();
      ctx.moveTo(0, -scale * 0.55);
      ctx.lineTo(0, scale * 0.62);
      ctx.stroke();

      ctx.lineWidth = Math.max(0.8, scale * 0.06);
      ctx.beginPath();
      ctx.moveTo(0, -scale * 0.48);
      ctx.quadraticCurveTo(-scale * 0.18, -scale * 0.86, -scale * 0.30, -scale * 0.98);
      ctx.moveTo(0, -scale * 0.48);
      ctx.quadraticCurveTo(scale * 0.18, -scale * 0.86, scale * 0.30, -scale * 0.98);
      ctx.stroke();

      ctx.restore();
    }

    function drawShards(pulse) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      // 不做每帧排序（太耗性能）
      // 改用：背面粒子降低亮度+透明度来模拟深度感
      for (const s of shards) {
        const flicker = 0.80 + 0.20 * Math.sin(time * (1.7 + s.flicker) + s.seed);

        // projZ > 0 表示粒子在相机后方（背面）
        const isBack  = (s.projZ || 0) > 0;
        const backFade = isBack ? 0.45 : 1.0;
        const alpha   = s.alpha * flicker * backFade;

        const ps   = Math.max(0.35, Math.min(2.0, s.projScale || 1));
        const size = s.size * ps * (0.95 + 0.08 * Math.sin(time * 1.5 + s.seed));

        const depthBright = s.brightness * (isBack ? 0.5 : 1.0);
        const shardAlpha  = alpha * (s.isInnerLayer ? 0.80 : 1.0);
        const angle3d     = Math.atan2(s.b3y || 0, s.b3x || 0);

        const px = s.x, py = s.y;

        if (shardAlpha > 0.07 && size > 0.5) {
          const glowScale = s.isBigShard ? 3.6 : (s.isTinyShard ? 1.7 : 2.6);
          const glow = ctx.createRadialGradient(px, py, 0, px, py, size * glowScale);
          glow.addColorStop(0, colorForShard(depthBright + 0.15, shardAlpha * 0.14, s.depth, angle3d, s.isInnerLayer));
          glow.addColorStop(1, 'rgba(60,0,10,0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(px, py, size * glowScale, 0, Math.PI * 2);
          ctx.fill();
        }

        if (shardAlpha > 0.06 && size > 0.5) {
          drawTriangle(px, py, size,
            s.rot + Math.sin(time * 0.9 + s.seed) * (s.isBigShard ? 0.07 : 0.12),
            s.stretch,
            colorForShard(depthBright + pulse * 0.04, shardAlpha, s.depth, angle3d, s.isInnerLayer)
          );
          drawGlassHighlight(px, py, size,
            s.rot + Math.sin(time * 0.9 + s.seed) * (s.isBigShard ? 0.07 : 0.12),
            s.stretch, shardAlpha, s.isBigShard
          );

          if (shardAlpha > 0.11) {
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(s.rot + Math.sin(time * 0.9 + s.seed) * (s.isBigShard ? 0.07 : 0.12));
            ctx.scale(s.stretch, 1);
            ctx.strokeStyle = colorForShard(1.05, shardAlpha * (s.isBigShard ? 0.28 : 0.14), Math.min(1, s.depth + 0.08), angle3d, false);
            ctx.lineWidth = s.isBigShard ? 0.85 : 0.40;
            ctx.beginPath();
            ctx.moveTo(0, -size); ctx.lineTo(size * 0.88, size * 0.72); ctx.lineTo(-size * 0.88, size * 0.72);
            ctx.closePath(); ctx.stroke();
            ctx.restore();
          }
        }
      }
      ctx.restore();
    }

    function drawCore(pulse) {
      const reveal = titleReveal * titleReveal * (3 - 2 * titleReveal);
      const r = 11 + pulse * 6;
      const grad = ctx.createRadialGradient(cx, cy + unit * 0.02, 0, cx, cy + unit * 0.02, r * (4.4 + reveal * 0.5));
      grad.addColorStop(0, `rgba(255,160,165,${0.36 + reveal * 0.12})`);
      grad.addColorStop(0.12, `rgba(255,86,96,${0.24 + reveal * 0.10})`);
      grad.addColorStop(0.28, `rgba(220,24,40,${0.12 + reveal * 0.08})`);
      grad.addColorStop(1, 'rgba(50,0,10,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy + unit * 0.02, r * (4.4 + reveal * 0.5), 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = `rgba(255, 110, 120, ${0.16 + pulse * 0.08 + reveal * 0.10})`;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.arc(cx, cy + unit * 0.02, r * 1.6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy + unit * 0.02, r * 2.45, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }


    function isPointInCenterRevealZone(x, y) {
      // 3D 下用屏幕中心圆形区域
      const dx = x - cx;
      const dy = y - cy;
      return Math.hypot(dx, dy) < unit * 0.20;
    }

    // 判断是否点击在爱心边缘（可拖拽旋转区域）
    function isPointOnHeartEdge(x, y) {
      const dx0 = x - cx;
      const dy0 = y - cy;
      const cosR = Math.cos(-heartRotation);
      const sinR = Math.sin(-heartRotation);
      const lx = (dx0 * cosR - dy0 * sinR) / (unit * 0.06);
      const ly = (dx0 * sinR + dy0 * cosR) / (unit * 0.06);
      // 找最近的心形边界点，判断距离
      let minDist = Infinity;
      for (let i = 0; i < 80; i++) {
        const t = (i / 80) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        const d = Math.hypot(lx - hp.x, ly - hp.y);
        if (d < minDist) minDist = d;
      }
      return minDist < 3.2; // 心形轮廓附近3单位宽度
    }

    function drawCrossStar(x, y, size, alpha) {
      ctx.save();
      ctx.translate(x, y);
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = `rgba(255,245,250,${alpha})`;
      ctx.lineWidth = Math.max(0.8, size * 0.12);
      ctx.beginPath();
      ctx.moveTo(-size, 0); ctx.lineTo(size, 0);
      ctx.moveTo(0, -size); ctx.lineTo(0, size);
      ctx.moveTo(-size * 0.72, -size * 0.72); ctx.lineTo(size * 0.72, size * 0.72);
      ctx.moveTo(-size * 0.72, size * 0.72); ctx.lineTo(size * 0.72, -size * 0.72);
      ctx.stroke();
      ctx.restore();
    }

    function drawPetalShape(x, y, size, rotation, alpha) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      const grad = ctx.createLinearGradient(-size * 0.4, -size, size * 0.6, size);
      grad.addColorStop(0, `rgba(255,246,250,${alpha * 0.95})`);
      grad.addColorStop(0.45, `rgba(255,188,214,${alpha * 0.78})`);
      grad.addColorStop(1, `rgba(255,110,160,${alpha * 0.06})`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.bezierCurveTo(size * 0.74, -size * 0.42, size * 0.68, size * 0.74, 0, size);
      ctx.bezierCurveTo(-size * 0.68, size * 0.74, -size * 0.74, -size * 0.42, 0, -size);
      ctx.fill();
      ctx.restore();
    }

    // ══ 绘制爱心内部世界（含照片展示）══
    function drawInnerWorld() {
      if (innerWorldReveal <= 0.001) return;
      const ease = innerWorldReveal * innerWorldReveal * (3 - 2 * innerWorldReveal);
      innerWorldTime += 0.012;

      ctx.save();
      ctx.globalAlpha = ease;

      const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.88);
      bg.addColorStop(0, 'rgba(62,0,36,1)');
      bg.addColorStop(0.24, 'rgba(24,0,18,1)');
      bg.addColorStop(0.62, 'rgba(6,0,8,1)');
      bg.addColorStop(1, 'rgba(0,0,0,1)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      ctx.globalCompositeOperation = 'lighter';
      for (const s of innerWorldStars) {
        const sx = s.x * w;
        const sy = s.y * h;
        const tw = 0.5 + 0.5 * Math.sin(innerWorldTime * (s.big ? 2.8 : 2.0) + s.twinkle);
        const a = s.alpha * tw * ease;
        const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, s.size * (s.big ? 6 : 3));
        grd.addColorStop(0, `rgba(255,235,242,${a})`);
        grd.addColorStop(0.4, `rgba(255,168,210,${a * 0.38})`);
        grd.addColorStop(1, 'rgba(255,80,120,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(sx, sy, s.size * (s.big ? 6 : 3), 0, Math.PI * 2);
        ctx.fill();
        if (s.big) drawCrossStar(sx, sy, s.size * 3.2, a * 0.55);
      }

      for (const p of innerWorldParticles) {
        p.angle += p.speed * (1 + p.depth * 0.55);
        const baseR = Math.min(w, h) * 0.47 * p.radius;
        const spiral = p.angle + p.arm * Math.PI;
        const armTight = 0.38 + p.radius * 0.84;
        const px2 = cx + Math.cos(spiral) * baseR * armTight;
        const py2 = cy + Math.sin(spiral) * baseR * 0.48 * armTight + p.lift * Math.min(w, h);
        const glow = ctx.createRadialGradient(px2, py2, 0, px2, py2, p.size * 5.4);
        const hue = p.hue + innerWorldTime * 12;
        const a = p.alpha * ease * (0.50 + 0.50 * Math.sin(innerWorldTime * 1.6 + p.seed));
        glow.addColorStop(0, `hsla(${hue},100%,90%,${a})`);
        glow.addColorStop(0.5, `hsla(${hue},92%,62%,${a * 0.34})`);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(px2, py2, p.size * 5.4, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const m of innerWorldMeteors) {
        m.progress += m.speed;
        if (m.progress > 1.18) {
          m.progress = -Math.random() * 0.35;
          m.y = 0.08 + Math.random() * 0.55;
          m.len = 90 + Math.random() * 140;
        }
        const mx = (m.progress * 1.3 - 0.16) * w;
        const my = m.y * h + Math.sin(innerWorldTime + m.seed) * 12;
        const trail = ctx.createLinearGradient(mx - m.len, my - m.len * 0.28, mx, my);
        trail.addColorStop(0, 'rgba(255,255,255,0)');
        trail.addColorStop(0.4, `rgba(255,204,224,${m.alpha * 0.28 * ease})`);
        trail.addColorStop(1, `rgba(255,252,255,${m.alpha * ease})`);
        ctx.strokeStyle = trail;
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.moveTo(mx - m.len, my - m.len * 0.28);
        ctx.lineTo(mx, my);
        ctx.stroke();
      }

      const pulse2 = (Math.sin(innerWorldTime * 2.2) + 1) * 0.5;
      const heartR = Math.min(w, h) * (0.19 + pulse2 * 0.025);
      const hg = ctx.createRadialGradient(cx, cy, 0, cx, cy, heartR * 2.15);
      hg.addColorStop(0, `rgba(255,170,200,${0.30 * ease})`);
      hg.addColorStop(0.4, `rgba(200,30,70,${0.13 * ease})`);
      hg.addColorStop(1, 'rgba(60,0,15,0)');
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(cx, cy, heartR * 2.15, 0, Math.PI * 2); ctx.fill();

      ctx.globalCompositeOperation = 'source-over';
      const photoSize = heartR * 1.28;
      const photoHS   = photoSize / 16;

      ctx.save();
      ctx.translate(cx, cy);
      const hazeG = ctx.createRadialGradient(0, -photoSize * 0.08, 0, 0, 0, photoSize * 1.2);
      hazeG.addColorStop(0, `rgba(255,200,230,${0.18 * ease})`);
      hazeG.addColorStop(0.5, `rgba(180,20,60,${0.10 * ease})`);
      hazeG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = hazeG;
      ctx.beginPath();
      for (let i = 0; i <= 260; i++) {
        const t = (i / 260) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        i === 0 ? ctx.moveTo(hp.x * photoHS * 1.25, hp.y * photoHS * 1.25)
                : ctx.lineTo(hp.x * photoHS * 1.25, hp.y * photoHS * 1.25);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();

      if (innerPhotoReady) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.beginPath();
        for (let i = 0; i <= 260; i++) {
          const t = (i / 260) * Math.PI * 2;
          const hp = heartPoint(t, 1);
          i === 0 ? ctx.moveTo(hp.x * photoHS, hp.y * photoHS)
                  : ctx.lineTo(hp.x * photoHS, hp.y * photoHS);
        }
        ctx.closePath(); ctx.clip();
        const ir = innerPhoto.width / innerPhoto.height;
        const bw = photoSize * 2.2, bh = photoSize * 2.0;
        let dw, dh;
        if (ir > bw / bh) { dh = bh; dw = dh * ir; }
        else               { dw = bw; dh = dw / ir; }
        ctx.globalAlpha = ease * 0.92;
        ctx.drawImage(innerPhoto, -dw / 2, -dh / 2 - photoSize * 0.06, dw, dh);
        ctx.globalAlpha = ease * 0.55;
        ctx.globalCompositeOperation = 'lighter';
        const shine = ctx.createRadialGradient(0, -photoSize * 0.22, 0, 0, 0, photoSize * 0.9);
        shine.addColorStop(0, 'rgba(255,255,255,0.18)');
        shine.addColorStop(0.5, 'rgba(255,180,210,0.08)');
        shine.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = shine;
        ctx.fillRect(-photoSize * 1.4, -photoSize * 1.4, photoSize * 2.8, photoSize * 2.8);
        ctx.restore();
      } else {
        ctx.save();
        ctx.globalAlpha = ease * 0.45;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${Math.max(13, Math.floor(unit * 0.075))}px sans-serif`;
        ctx.fillStyle = 'rgba(255,200,220,0.8)';
        ctx.fillText('按 I 键上传照片', cx, cy - heartR * 0.1);
        ctx.restore();
      }

      ctx.save();
      ctx.translate(cx, cy);
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = `rgba(255,220,235,${0.55 * ease})`;
      ctx.lineWidth = 1.8 + pulse2 * 1.2;
      ctx.shadowColor = 'rgba(255,80,130,0.9)';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      for (let i = 0; i <= 260; i++) {
        const t = (i / 260) * Math.PI * 2;
        const hp = heartPoint(t, 1);
        i === 0 ? ctx.moveTo(hp.x * photoHS, hp.y * photoHS)
                : ctx.lineTo(hp.x * photoHS, hp.y * photoHS);
      }
      ctx.closePath(); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();

      ctx.globalCompositeOperation = 'lighter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const item of innerWorldPoems) {
        const r = heartR * (1.42 + item.radius);
        const px = cx + Math.cos(item.angle + innerWorldTime * 0.16) * r;
        const py = cy + Math.sin(item.angle + innerWorldTime * 0.16) * r * 0.62;
        const alpha = item.alpha * (0.42 + 0.58 * Math.sin(innerWorldTime * 1.25 + item.phase)) * ease;
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(Math.sin(innerWorldTime * 0.2 + item.phase) * 0.08);
        ctx.font = `${Math.max(14, Math.floor(unit * 0.05))}px "STKaiti","KaiTi",cursive`;
        ctx.fillStyle = `rgba(255,228,236,${alpha})`;
        ctx.shadowColor = `rgba(255,132,176,${alpha * 0.9})`;
        ctx.shadowBlur = 14;
        ctx.fillText(item.text, 0, 0);
        ctx.restore();
      }

      for (const p of innerWorldPetals) {
        p.progress += p.speed;
        if (p.progress > 1) p.progress -= 1;
        p.rot += p.spin;
        let sx, sy;
        if (p.side === 0) { sx = -0.08 * w; sy = (0.12 + ((p.seed * 1.37) % 0.76)) * h; }
        else if (p.side === 1) { sx = 1.08 * w; sy = (0.12 + ((p.seed * 1.11) % 0.76)) * h; }
        else if (p.side === 2) { sx = (0.12 + ((p.seed * 1.61) % 0.76)) * w; sy = -0.08 * h; }
        else { sx = (0.12 + ((p.seed * 1.83) % 0.76)) * w; sy = 1.08 * h; }
        const t = p.progress;
        const x = sx + (cx - sx) * t + Math.sin(innerWorldTime * 0.9 + p.drift) * 18;
        const y = sy + (cy - sy) * t + Math.cos(innerWorldTime * 0.8 + p.drift) * 14;
        drawPetalShape(x, y, p.size * (1 - t * 0.18), p.rot, p.alpha * ease * (1 - t * 0.35));
      }

      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = ease * (0.72 + 0.28 * Math.sin(innerWorldTime * 1.4));
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `${Math.max(18, Math.floor(unit * 0.115))}px "STKaiti","KaiTi","DFKai-SB",cursive`;
      ctx.shadowColor = 'rgba(255,120,160,0.9)'; ctx.shadowBlur = 26;
      const tg = ctx.createLinearGradient(cx - unit * 0.28, 0, cx + unit * 0.28, 0);
      tg.addColorStop(0, 'rgba(255,248,238,0.97)');
      tg.addColorStop(0.5, 'rgba(255,205,175,0.99)');
      tg.addColorStop(1, 'rgba(255,240,220,0.97)');
      ctx.fillStyle = tg;
      ctx.fillText('爱 · 无 尽 头', cx, cy + heartR * 1.22);
      ctx.shadowBlur = 0;

      ctx.globalAlpha = ease * 0.48;
      ctx.font = `${Math.max(11, Math.floor(unit * 0.058))}px sans-serif`;
      ctx.fillStyle = 'rgba(255,200,220,0.75)';
      ctx.fillText('点击退出  |  按 I 换照片', cx, cy + heartR * 1.58);

      ctx.restore();
    }
    // 归位：平滑回到正面朝向
    function triggerReturn() {
      if (isReturning) return;
      // 将 rotX/rotY 归一化到 [-π, π]
      returnStartX = ((rotX + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
      returnStartY = ((rotY + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
      rotX = returnStartX;
      rotY = returnStartY;
      returnProgress = 0;
      isReturning = true;
      velX = 0; velY = 0;
    }

    function syncPointerFromTouch(touch) {
      if (!touch) return;
      pointer.x = touch.clientX;
      pointer.y = touch.clientY;
    }

    function frame(now) {
      const dt = Math.min(1.8, (now - (frame.last || now)) / 16.6667);
      frame.last = now;
      time += dt * 0.016;
      const pulse = (Math.sin(time * 2.15) + 1) * 0.5;
      beatPhase = (time * 0.34) % 1;

      // ── 3D 惯性旋转衰减 + 归位动画 ──
      if (isReturning) {
        returnProgress += 1 / RETURN_FRAMES;
        if (returnProgress >= 1) {
          returnProgress = 1;
          isReturning = false;
          rotX = 0; rotY = 0;
          velX = 0; velY = 0;
        } else {
          // ease-out cubic
          const e = 1 - Math.pow(1 - returnProgress, 3);
          rotX = returnStartX * (1 - e);
          rotY = returnStartY * (1 - e);
        }
      } else if (!isDraggingHeart) {
        velX *= 0.955;
        velY *= 0.955;
        rotX += velX;
        rotY += velY;
      }
      heartRotation = rotY;

      // 更新内部世界过渡
      const iwTarget = innerWorldActive ? 1 : 0;
      innerWorldReveal += (iwTarget - innerWorldReveal) * 0.045;

      drawBackground(pulse);
      drawEdgeAura(pulse);
      updateReturnBtn();
      drawAmbientBits();
      drawPetals();
      drawDecorFrame();
      drawHUD(pulse);
      drawOuterHalo(pulse);
      for (const s of shards) updateShard(s, pulse, dt);
      for (const f of floaters) updateFloater(f, pulse, dt);
      for (const s of streamers) updateStreamer(s);
      drawGlowShell(pulse);
      drawInnerNetwork(pulse);
      drawMesh(pulse);
      drawShards(pulse);
      drawFloaters(pulse);
      drawStreamers();
      drawCore(pulse);
      drawCenterTitle();
      drawInnerWorld();
      requestAnimationFrame(frame);
    }

    // 归位按钮
    const returnBtn = document.getElementById('returnBtn');
    returnBtn.addEventListener('click', () => { if (!innerWorldActive) triggerReturn(); });

    // 旋转后显示归位按钮，归位完毕后隐藏
    function updateReturnBtn() {
      const hasRotation = Math.abs(rotX) > 0.08 || Math.abs(rotY) > 0.08;
      const show = hasRotation && !isReturning && !innerWorldActive;
      returnBtn.style.opacity = show ? '0.82' : '0';
      returnBtn.style.pointerEvents = show ? 'auto' : 'none';
    }

    // 按 R 或 双击 归位
    window.addEventListener('keydown', (e) => {
      if ((e.key === 'r' || e.key === 'R') && !e.repeat && !innerWorldActive) {
        e.preventDefault();
        triggerReturn();
      }
    });
    window.addEventListener('dblclick', (e) => {
      if (!innerWorldActive && !isPointInCenterRevealZone(e.clientX, e.clientY)) {
        triggerReturn();
      }
    });

    window.addEventListener('resize', resize);

    // ─── 鼠标事件：拖拽旋转 + 指针光标 ───
    window.addEventListener('mousemove', (e) => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;

      if (isDraggingHeart) {
        dragDX = e.clientX - dragPrevX;
        dragDY = e.clientY - dragPrevY;
        const sensitivity = 0.007;
        rotY += dragDX * sensitivity;
        rotX += dragDY * sensitivity;
        // 限制 X 轴翻转范围，防止上下颠倒超过 ±85°
        rotX = Math.max(-Math.PI * 0.47, Math.min(Math.PI * 0.47, rotX));
        velY = dragDX * sensitivity;
        velX = dragDY * sensitivity;
        dragPrevX = e.clientX;
        dragPrevY = e.clientY;
      } else {
        if (isPointInCenterRevealZone(e.clientX, e.clientY)) {
          canvas.style.cursor = 'pointer';
        } else {
          canvas.style.cursor = 'grab';
        }
      }
    });

    window.addEventListener('mousedown', (e) => {
      if (innerWorldActive) return;
      if (e.button !== 0) return;
      isReturning = false;          // 拖拽打断归位
      isDraggingHeart = true;
      dragPrevX = e.clientX;
      dragPrevY = e.clientY;
      dragDX = 0; dragDY = 0;
      velX = 0; velY = 0;
      canvas.style.cursor = 'grabbing';
      e.preventDefault();
    });

    window.addEventListener('mouseup', (e) => {
      if (isDraggingHeart) {
        isDraggingHeart = false;
        // 松手时保留最后一帧的角速度，形成惯性
        canvas.style.cursor = isPointInCenterRevealZone(e.clientX, e.clientY) ? 'pointer' : 'grab';
      }
    });

    window.addEventListener('mouseleave', () => {
      isDraggingHeart = false;
      pointer.x = -9999;
      pointer.y = -9999;
    });

    // 鼠标点击：中部进入内部世界
    window.addEventListener('click', (e) => {
      if (isDraggingHeart) return;
      if (innerWorldActive) {
        innerWorldActive = false;
        return;
      }
      if (isPointInCenterRevealZone(e.clientX, e.clientY)) {
        innerWorldActive = true;
      }
    });

    // ─── 触屏事件 ───
    let touchDragActive = false;

    window.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      if (!t) return;
      syncPointerFromTouch(t);

      if (innerWorldActive) {
        // 内部世界中：点击退出
        innerWorldActive = false;
        return;
      }

      if (isPointInCenterRevealZone(t.clientX, t.clientY)) {
        innerWorldActive = true;
      } else {
        touchDragActive = true;
        isReturning = false;
        dragPrevX = t.clientX;
        dragPrevY = t.clientY;
        dragDX = 0; dragDY = 0;
        velX = 0; velY = 0;
      }
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (!t) return;
      syncPointerFromTouch(t);

      if (touchDragActive) {
        const sensitivity = 0.007;
        const dx2 = t.clientX - dragPrevX;
        const dy2 = t.clientY - dragPrevY;
        rotY += dx2 * sensitivity;
        rotX += dy2 * sensitivity;
        rotX = Math.max(-Math.PI * 0.47, Math.min(Math.PI * 0.47, rotX));
        velY = dx2 * sensitivity;
        velX = dy2 * sensitivity;
        dragPrevX = t.clientX;
        dragPrevY = t.clientY;
      }
    }, { passive: true });

    window.addEventListener('touchend', () => {
      touchDragActive = false;
      pointer.x = -9999;
      pointer.y = -9999;
    });

    window.addEventListener('touchcancel', () => {
      touchDragActive = false;
      pointer.x = -9999;
      pointer.y = -9999;
    });

    resize();
    // 提示文字自动消失
    setTimeout(() => {
      const hint = document.getElementById('dragHint');
      if (hint) hint.style.opacity = '0';
    }, 4200);
    for (const s of shards) {
      s.x = cx + rand(-12, 12);
      s.y = cy + rand(-12, 12);
    }
    for (const f of floaters) {
      f.x = cx + rand(-30, 30);
      f.y = cy + rand(-30, 30);
    }
    for (const s of streamers) {
      updateStreamer(s);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
